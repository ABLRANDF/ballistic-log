<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Ballistic Log" />
  <title>Ballistic Log</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0c0c0d" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { background: #060607; overflow-x: hidden; }
    ::-webkit-scrollbar { display: none; }
    * { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    /* ─── Fonts ─── */
    const _fl = document.createElement("link");
    _fl.rel = "stylesheet";
    _fl.href = "https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap";
    document.head.appendChild(_fl);

    /* ─── Primer presets by cartridge type ─── */
    const RIFLE_PRIMERS  = ["Federal 210","Federal 210M","Federal GM215M","CCI BR2","CCI 200","CCI 250","Rem 9½","Rem 9½M","Winchester WLR","Murom KVB-7","Small Rifle","Large Rifle","Small Rifle Mag","Large Rifle Mag"];
    const PISTOL_PRIMERS = ["Federal 100","Federal 150","CCI 500","CCI 550","CCI 300","CCI 350","Rem 1½","Rem 5½","Winchester WSP","Winchester WLP","Small Pistol","Large Pistol","Small Pistol Mag","Large Pistol Mag"];

    const BEST_METRICS = [
      { key:"avgMoa",  label:"Avg MOA",    desc:"Lowest average group size across all logged groups" },
      { key:"bestMoa", label:"Best Group", desc:"Smallest single group ever recorded"                },
      { key:"stdDev",  label:"Consistent", desc:"Most consistent — lowest group-to-group variance"   },
    ];

    /* ─── Theme tokens ─── */
    const DARK_T = {
      bg:"#0c0c0d", surface:"#131315", card:"#18181b", border:"#27272a",
      phone:"#1c1c1f", phoneGlow:"rgba(0,0,0,0.9)",
      gold:"#c9a96e", goldDim:"#7a5c30", goldGlow:"rgba(201,169,110,0.12)",
      amber:"#f59e0b", amberDim:"rgba(245,158,11,0.12)",
      red:"#ef4444",   redDim:"rgba(239,68,68,0.12)",
      blue:"#60a5fa",  blueDim:"rgba(96,165,250,0.1)",
      green:"#4ade80", greenDim:"rgba(74,222,128,0.1)",
      purple:"#a78bfa",purpleDim:"rgba(167,139,250,0.12)",
      text:"#e4e4e7",  textMid:"#71717a", textDim:"#3f3f46",
      statusText:"#71717a", homeBar:"#27272a",
      inputBg:"#18181b", inputText:"#e4e4e7",
      mono:"'JetBrains Mono',monospace",
      display:"'Bebas Neue',sans-serif",
      body:"'DM Sans',sans-serif",
      isLight: false,
    };
    const LIGHT_T = {
      bg:"#f8f8f8", surface:"#ffffff", card:"#f2f2f4", border:"#e0e0e5",
      phone:"#d0d0d5", phoneGlow:"rgba(0,0,0,0.18)",
      gold:"#9a6e2e", goldDim:"#b8882a", goldGlow:"rgba(154,110,46,0.1)",
      amber:"#c07800", amberDim:"rgba(192,120,0,0.1)",
      red:"#cc2222",   redDim:"rgba(204,34,34,0.08)",
      blue:"#1a6fd4",  blueDim:"rgba(26,111,212,0.08)",
      green:"#1a8a3c", greenDim:"rgba(26,138,60,0.08)",
      purple:"#6a3fcc",purpleDim:"rgba(106,63,204,0.1)",
      text:"#111113",  textMid:"#555560", textDim:"#9999a8",
      statusText:"#555560", homeBar:"#cccccc",
      inputBg:"#ffffff", inputText:"#111113",
      mono:"'JetBrains Mono',monospace",
      display:"'Bebas Neue',sans-serif",
      body:"'DM Sans',sans-serif",
      isLight: true,
    };

    const noise = `url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E")`;

    /* ─── Data helpers ─── */
    const r2 = v => Math.round(v*100)/100;
    const entryAmmoName = e => e.isCustom ? (e.customName||"Custom Load") : (e.brand||"Unnamed");
    const allRifleEntries    = rifle => rifle.sessions.flatMap(s => s.rangeEntries);
    const allRifleMoaEntries = rifle => allRifleEntries(rifle).filter(e=>e.moa!=null);
    const ammoKey = e => entryAmmoName(e)+(e.bulletWeight||"")+(e.bulletType||"")+(e.powderCharge||"");
    const groupEntriesByAmmo = rifle => {
      const groups = {};
      allRifleEntries(rifle).forEach(e => {
        const k = ammoKey(e);
        if (!groups[k]) groups[k] = { entries:[], proto:e };
        groups[k].entries.push(e);
      });
      return Object.values(groups);
    };
    const groupAvgMoa  = g => { const v=g.entries.map(e=>e.moa).filter(m=>m!=null); return v.length?r2(v.reduce((a,b)=>a+b,0)/v.length):null; };
    const groupBestMoa = g => { const v=g.entries.map(e=>e.moa).filter(m=>m!=null); return v.length?r2(Math.min(...v)):null; };
    const groupStdDev  = g => {
      const v=g.entries.map(e=>e.moa).filter(m=>m!=null); if(v.length<2) return null;
      const avg=v.reduce((a,b)=>a+b,0)/v.length;
      return r2(Math.sqrt(v.reduce((a,b)=>a+(b-avg)**2,0)/v.length));
    };
    const groupMetricVal  = (g,metric) => metric==="avgMoa"?groupAvgMoa(g):metric==="bestMoa"?groupBestMoa(g):groupStdDev(g);
    const findBestAmmoGroup = (rifle,metric) => {
      const gs = groupEntriesByAmmo(rifle).filter(g=>groupMetricVal(g,metric)!=null);
      return gs.length?gs.reduce((a,b)=>groupMetricVal(b,metric)<groupMetricVal(a,metric)?b:a):null;
    };
    const sessionMoas    = s => s.rangeEntries.map(e=>e.moa).filter(m=>m!=null);
    const sessionAvgMoa  = s => { const v=sessionMoas(s); return v.length?r2(v.reduce((a,b)=>a+b,0)/v.length):null; };
    const sessionBestMoa = s => { const v=sessionMoas(s); return v.length?r2(Math.min(...v)):null; };
    const latestRifleMoa = rifle => { const a=allRifleMoaEntries(rifle); return a.length?a[a.length-1].moa:null; };
    const bestRifleMoa   = rifle => { const a=allRifleMoaEntries(rifle); return a.length?r2(Math.min(...a.map(e=>e.moa))):null; };

    /* ─── Empty forms ─── */
    const EMPTY_RIFLE   = { name:"", serial:"", caliber:"", cleanInterval:"", moaThreshold:"" };
    const EMPTY_SESSION = { customName:"", conditions:"", environmentals:"" };
    const EMPTY_ENTRY   = {
      entryTitle:"",
      isCustom:false, cartridgeType:"rifle",
      brand:"", customName:"",
      bulletType:"", bulletWeight:"", bulletMfg:"",
      powderCharge:"", powderMfg:"", primerType:"",
      shots:"", moa:"",
    };

    /* ══════════════════════════════════════════════════
       SHARED COMPONENTS — defined outside App so React
       never remounts them on re-render (fixes focus loss)
    ══════════════════════════════════════════════════ */

    /* ── PrimerField: type-or-pick with dropdown ── */
    const PrimerField = ({ value, onChange, presets, T }) => {
      const [open, setOpen] = useState(false);
      const ref = useRef(null);
      useEffect(() => {
        const handler = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
        document.addEventListener("mousedown", handler);
        return () => document.removeEventListener("mousedown", handler);
      }, []);
      return (
        <div ref={ref} style={{position:"relative"}}>
          <div style={{display:"flex",gap:6}}>
            <input
              value={value}
              onChange={e=>onChange(e.target.value)}
              placeholder="Type or pick a primer…"
              style={{flex:1,background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:10,padding:"11px 13px",color:T.inputText,fontSize:13,fontFamily:T.body,outline:"none"}}
              onFocus={e=>{e.target.style.borderColor=T.goldDim; setOpen(true);}}
              onBlur={e=>e.target.style.borderColor=T.border}
            />
            <button onClick={()=>setOpen(o=>!o)} style={{padding:"11px 13px",background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:10,color:T.textMid,cursor:"pointer",fontSize:13,flexShrink:0}}>▾</button>
          </div>
          {open&&(
            <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,zIndex:99,maxHeight:200,overflowY:"auto",boxShadow:"0 8px 24px rgba(0,0,0,0.25)"}}>
              {presets.map(p=>(
                <div key={p} onMouseDown={()=>{onChange(p);setOpen(false);}}
                  style={{padding:"10px 14px",fontFamily:T.body,fontSize:13,color:value===p?T.gold:T.text,background:value===p?T.goldGlow:"transparent",cursor:"pointer",borderBottom:`1px solid ${T.border}`}}>
                  {p}
                </div>
              ))}
            </div>
          )}
        </div>
      );
    };

    /* ── RifleFormFields ── */
    const RifleFormFields = ({ form, setForm, T }) => (
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div>
          <div style={{fontFamily:T.mono,fontSize:10,fontWeight:600,letterSpacing:"0.14em",color:T.textMid,textTransform:"uppercase",marginBottom:7}}>Rifle Name *</div>
          <input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="e.g. Remington 700 LR"
            style={{width:"100%",background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:10,padding:"12px 14px",color:T.inputText,fontSize:14,fontFamily:T.body,outline:"none",boxSizing:"border-box"}}
            onFocus={e=>e.target.style.borderColor=T.goldDim} onBlur={e=>e.target.style.borderColor=T.border}/>
        </div>
        <div>
          <div style={{fontFamily:T.mono,fontSize:10,fontWeight:600,letterSpacing:"0.14em",color:T.textMid,textTransform:"uppercase",marginBottom:7}}>Serial Number <span style={{fontWeight:400,color:T.textDim}}>(optional)</span></div>
          <input value={form.serial} onChange={e=>setForm({...form,serial:e.target.value})} placeholder="e.g. US12345678"
            style={{width:"100%",background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:10,padding:"12px 14px",color:T.inputText,fontSize:14,fontFamily:T.mono,outline:"none",boxSizing:"border-box",letterSpacing:"0.06em"}}
            onFocus={e=>e.target.style.borderColor=T.goldDim} onBlur={e=>e.target.style.borderColor=T.border}/>
        </div>
        <div>
          <div style={{fontFamily:T.mono,fontSize:10,fontWeight:600,letterSpacing:"0.14em",color:T.textMid,textTransform:"uppercase",marginBottom:7}}>Caliber <span style={{fontWeight:400,color:T.textDim}}>(optional)</span></div>
          <input value={form.caliber} onChange={e=>setForm({...form,caliber:e.target.value})} placeholder="e.g. .308 Win, 6.5 Creedmoor"
            style={{width:"100%",background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:10,padding:"12px 14px",color:T.inputText,fontSize:14,fontFamily:T.body,outline:"none",boxSizing:"border-box"}}
            onFocus={e=>e.target.style.borderColor=T.goldDim} onBlur={e=>e.target.style.borderColor=T.border}/>
        </div>
        <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,overflow:"hidden"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",borderBottom:`1px solid ${T.border}`,background:T.amberDim}}>
            <span>🧹</span><span style={{fontFamily:T.mono,fontSize:10,color:T.amber,letterSpacing:"0.14em",textTransform:"uppercase",fontWeight:700}}>Barrel Clean Reminder</span>
          </div>
          <div style={{padding:"12px 14px 14px"}}>
            <div style={{fontFamily:T.mono,fontSize:10,fontWeight:600,letterSpacing:"0.14em",color:T.textMid,textTransform:"uppercase",marginBottom:7}}>Warn after every X rounds <span style={{fontWeight:400,color:T.textDim}}>(optional)</span></div>
            <input value={form.cleanInterval} onChange={e=>setForm({...form,cleanInterval:e.target.value})} placeholder="e.g. 200" type="number"
              style={{width:"100%",background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:10,padding:"12px 14px",color:T.inputText,fontSize:14,fontFamily:T.mono,outline:"none",boxSizing:"border-box"}}
              onFocus={e=>e.target.style.borderColor=T.goldDim} onBlur={e=>e.target.style.borderColor=T.border}/>
          </div>
        </div>
        <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,overflow:"hidden"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",borderBottom:`1px solid ${T.border}`,background:T.redDim}}>
            <span>🎯</span><span style={{fontFamily:T.mono,fontSize:10,color:T.red,letterSpacing:"0.14em",textTransform:"uppercase",fontWeight:700}}>Accuracy / Shot-Out Warning</span>
          </div>
          <div style={{padding:"12px 14px 14px"}}>
            <div style={{fontFamily:T.mono,fontSize:10,fontWeight:600,letterSpacing:"0.14em",color:T.textMid,textTransform:"uppercase",marginBottom:7}}>Warn if group exceeds X MOA <span style={{fontWeight:400,color:T.textDim}}>(optional)</span></div>
            <input value={form.moaThreshold} onChange={e=>setForm({...form,moaThreshold:e.target.value})} placeholder="e.g. 1.5" type="number" step="0.1"
              style={{width:"100%",background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:10,padding:"12px 14px",color:T.inputText,fontSize:14,fontFamily:T.mono,outline:"none",boxSizing:"border-box"}}
              onFocus={e=>e.target.style.borderColor=T.goldDim} onBlur={e=>e.target.style.borderColor=T.border}/>
            <div style={{fontFamily:T.mono,fontSize:10,color:T.textDim,marginTop:6,letterSpacing:"0.05em",lineHeight:1.5}}>Alerts when a logged group exceeds this value — may indicate barrel wear</div>
          </div>
        </div>
      </div>
    );

    /* ── EntryForm: add or edit an ammunition entry ── */
    const EntryForm = ({ form, setForm, moaThreshold, onSave, onCancel, saveLabel="LOG ENTRY", T }) => {
      const isCustom = form.isCustom;
      const cartType = form.cartridgeType || "rifle";
      const primerPresets = cartType==="pistol" ? PISTOL_PRIMERS : RIFLE_PRIMERS;
      const canSave = !!(form.shots && parseInt(form.shots) > 0 && (isCustom ? form.customName : form.brand));

      const inp = (val, onChange, placeholder, extra={}) => (
        <input value={val} onChange={onChange} placeholder={placeholder} {...extra}
          style={{width:"100%",background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:10,padding:"11px 13px",color:T.inputText,fontSize:13,fontFamily:T.body,outline:"none",boxSizing:"border-box",...(extra.style||{})}}
          onFocus={e=>e.target.style.borderColor=T.goldDim} onBlur={e=>e.target.style.borderColor=T.border}/>
      );
      const lbl = txt => <div style={{fontFamily:T.mono,fontSize:9,fontWeight:600,letterSpacing:"0.14em",color:T.textMid,textTransform:"uppercase",marginBottom:5}}>{txt}</div>;

      return (
        <div style={{display:"flex",flexDirection:"column",gap:12}}>

          {/* Optional entry title */}
          <div>
            {lbl("Entry Label (optional)")}
            {inp(form.entryTitle, e=>setForm({...form,entryTitle:e.target.value}), "e.g. 100yd group test, cold bore…")}
          </div>

          {/* Rounds + MOA */}
          <div style={{display:"flex",gap:8}}>
            <div style={{flex:1}}>
              {lbl("Rounds Fired *")}
              {inp(form.shots, e=>setForm({...form,shots:e.target.value}), "e.g. 20", {type:"number", style:{fontFamily:T.mono}})}
            </div>
            <div style={{flex:1}}>
              {lbl("Group Size (MOA)")}
              {inp(form.moa, e=>setForm({...form,moa:e.target.value}), "e.g. 0.8", {type:"number", step:"0.01", style:{fontFamily:T.mono}})}
            </div>
          </div>

          {moaThreshold && form.moa && parseFloat(form.moa) > moaThreshold && (
            <div style={{background:T.redDim,border:"1px solid rgba(239,68,68,0.3)",borderRadius:8,padding:"8px 12px"}}>
              <span style={{fontFamily:T.mono,fontSize:10,color:T.red}}>⚠ {form.moa} MOA EXCEEDS {moaThreshold} MOA THRESHOLD</span>
            </div>
          )}

          {/* Ammo block */}
          <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,overflow:"hidden"}}>
            <div style={{padding:"10px 14px",borderBottom:`1px solid ${T.border}`,background:T.blueDim}}>
              <span style={{fontFamily:T.mono,fontSize:10,color:T.blue,letterSpacing:"0.14em",fontWeight:700}}>🔫 AMMUNITION</span>
            </div>
            <div style={{padding:"12px",display:"flex",flexDirection:"column",gap:10}}>

              {/* Handload toggle */}
              <div onClick={()=>setForm({...form,isCustom:!isCustom,brand:"",customName:""})}
                style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 13px",background:T.card,border:`1px solid ${isCustom?T.goldDim:T.border}`,borderRadius:10,cursor:"pointer",userSelect:"none"}}>
                <span style={{fontFamily:T.mono,fontSize:11,color:isCustom?T.gold:T.textMid,letterSpacing:"0.08em"}}>CUSTOM / HANDLOAD</span>
                <div style={{width:40,height:22,background:isCustom?T.goldDim:"#52525b",borderRadius:11,position:"relative",transition:"background 0.2s",flexShrink:0}}>
                  <div style={{position:"absolute",top:3,left:isCustom?20:3,width:16,height:16,background:isCustom?T.gold:"#888",borderRadius:"50%",transition:"left 0.2s"}}/>
                </div>
              </div>

              {/* ── Factory ammo ── */}
              {!isCustom && <>
                <div>
                  {lbl("Manufacturer *")}
                  {inp(form.brand, e=>setForm({...form,brand:e.target.value}), "e.g. Federal, Lapua, Hornady")}
                </div>
                <div>
                  {lbl("Projectile Type (optional)")}
                  {inp(form.bulletType, e=>setForm({...form,bulletType:e.target.value}), "e.g. BTHP, FMJ, ELD-M, SST…")}
                </div>
                <div>
                  {lbl("Factory Spec / Lot (optional)")}
                  {inp(form.bulletWeight, e=>setForm({...form,bulletWeight:e.target.value}), "e.g. 168gr Gold Medal Match · Lot #A4421")}
                </div>
              </>}

              {/* ── Custom / Handload ── */}
              {isCustom && <>
                {/* Cartridge type: Rifle / Pistol */}
                <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:10,padding:"10px 12px"}}>
                  {lbl("Cartridge Type")}
                  <div style={{display:"flex",gap:6,marginTop:2}}>
                    {["rifle","pistol"].map(ct=>(
                      <button key={ct} onClick={()=>setForm({...form,cartridgeType:ct,primerType:""})}
                        style={{flex:1,padding:"9px",borderRadius:8,cursor:"pointer",fontFamily:T.mono,fontSize:11,fontWeight:700,letterSpacing:"0.08em",border:cartType===ct?`1px solid ${T.gold}`:`1px solid ${T.border}`,background:cartType===ct?T.goldGlow:"transparent",color:cartType===ct?T.gold:T.textMid,transition:"all 0.12s",textTransform:"uppercase"}}>
                        {ct==="rifle"?"🎯 Rifle":"🔫 Pistol"}
                      </button>
                    ))}
                  </div>
                </div>

                <div>
                  {lbl("Load Name *")}
                  {inp(form.customName, e=>setForm({...form,customName:e.target.value}), "e.g. 175gr SMK Precision Load")}
                </div>

                {/* Bullet */}
                <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:10,padding:"10px 12px 12px"}}>
                  <div style={{fontFamily:T.mono,fontSize:9,color:T.goldDim,letterSpacing:"0.14em",marginBottom:8,fontWeight:700}}>BULLET</div>
                  <div style={{display:"flex",gap:8,marginBottom:8}}>
                    <div style={{flex:1}}>
                      {lbl("Weight")}
                      {inp(form.bulletWeight, e=>setForm({...form,bulletWeight:e.target.value}), "e.g. 175gr")}
                    </div>
                    <div style={{flex:1}}>
                      {lbl("Manufacturer")}
                      {inp(form.bulletMfg, e=>setForm({...form,bulletMfg:e.target.value}), "e.g. Sierra")}
                    </div>
                  </div>
                  {lbl("Projectile Type")}
                  {inp(form.bulletType, e=>setForm({...form,bulletType:e.target.value}), "e.g. BTHP, HP, FMJ, SMK…")}
                </div>

                {/* Powder */}
                <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:10,padding:"10px 12px 12px"}}>
                  <div style={{fontFamily:T.mono,fontSize:9,color:T.amber,letterSpacing:"0.14em",marginBottom:8,fontWeight:700}}>POWDER</div>
                  <div style={{display:"flex",gap:8}}>
                    <div style={{flex:1}}>
                      {lbl("Charge Weight")}
                      {inp(form.powderCharge, e=>setForm({...form,powderCharge:e.target.value}), "e.g. 43.5gr")}
                    </div>
                    <div style={{flex:1}}>
                      {lbl("Powder Name")}
                      {inp(form.powderMfg, e=>setForm({...form,powderMfg:e.target.value}), "e.g. Varget")}
                    </div>
                  </div>
                </div>

                {/* Primer */}
                <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:10,padding:"10px 12px 12px"}}>
                  <div style={{fontFamily:T.mono,fontSize:9,color:T.purple,letterSpacing:"0.14em",marginBottom:8,fontWeight:700}}>
                    PRIMER — {cartType.toUpperCase()} PRESETS
                  </div>
                  <PrimerField value={form.primerType} onChange={v=>setForm({...form,primerType:v})} presets={primerPresets} T={T}/>
                </div>
              </>}
            </div>
          </div>

          {/* Save / Cancel */}
          <div style={{display:"flex",gap:8}}>
            <button onClick={onSave} disabled={!canSave}
              style={{flex:1,background:canSave?T.gold:T.card,border:"none",borderRadius:9,color:canSave?(T.isLight?"#fff":"#0c0c0d"):T.textDim,fontSize:12,fontWeight:700,fontFamily:T.mono,letterSpacing:"0.1em",padding:"13px",cursor:canSave?"pointer":"not-allowed"}}>
              {saveLabel}
            </button>
            <button onClick={onCancel}
              style={{background:"transparent",border:`1px solid ${T.border}`,borderRadius:9,color:T.textMid,fontSize:15,padding:"13px 15px",cursor:"pointer"}}>✕</button>
          </div>
        </div>
      );
    };

    /* ════════════════════════════════════════
       MAIN APP
    ════════════════════════════════════════ */
    function App() {
      const [lightMode, setLightMode]       = useState(false);
      const T = lightMode ? LIGHT_T : DARK_T;

      const [rifles, setRifles]             = useState([]);
      const [view, setView]                 = useState("rifles");
      const [selRifleId, setSelRifleId]     = useState(null);
      const [selSessionId, setSelSessionId] = useState(null);
      const [rifleForm, setRifleForm]       = useState(EMPTY_RIFLE);
      const [sessionForm, setSessionForm]   = useState(EMPTY_SESSION);
      const [editingRifle, setEditingRifle] = useState(false);
      const [editingSession, setEditingSession] = useState(false);
      const [entryForm, setEntryForm]       = useState(EMPTY_ENTRY);
      const [addingEntry, setAddingEntry]   = useState(false);
      const [editingEntryId, setEditingEntryId] = useState(null);
      const [cleanDismissed, setCleanDismissed] = useState({});
      const [moaDismissed, setMoaDismissed]     = useState({});
      const [bestMetric, setBestMetric]         = useState({});

      const selRifle   = rifles.find(r=>r.id===selRifleId);
      const selSession = selRifle?.sessions.find(s=>s.id===selSessionId);
      const getRifleMetric = r => bestMetric[r.id] || "avgMoa";

      /* ── shared styled primitives (depend on T) ── */
      const inp = (val, onChange, placeholder, extra={}) => (
        <input value={val} onChange={onChange} placeholder={placeholder} {...extra}
          style={{width:"100%",background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:10,padding:"12px 14px",color:T.inputText,fontSize:14,fontFamily:T.body,outline:"none",boxSizing:"border-box",...(extra.style||{})}}
          onFocus={e=>e.target.style.borderColor=T.goldDim} onBlur={e=>e.target.style.borderColor=T.border}/>
      );
      const textarea = (val, onChange, placeholder, rows=2) => (
        <textarea value={val} onChange={onChange} placeholder={placeholder} rows={rows}
          style={{width:"100%",background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:10,padding:"12px 14px",color:T.inputText,fontSize:14,fontFamily:T.body,outline:"none",resize:"none",boxSizing:"border-box"}}
          onFocus={e=>e.target.style.borderColor=T.goldDim} onBlur={e=>e.target.style.borderColor=T.border}/>
      );
      const lbl = (txt) => <div style={{fontFamily:T.mono,fontSize:10,fontWeight:600,letterSpacing:"0.14em",color:T.textMid,textTransform:"uppercase",marginBottom:7}}>{txt}</div>;

      /* ── computed ── */
      const totalRounds  = r => r.sessions.reduce((a,s)=>a+s.rangeEntries.reduce((b,e)=>b+e.count,0),0);
      const needsClean   = r => r.cleanInterval && r.roundsSinceClean>=r.cleanInterval && !cleanDismissed[r.id];
      const cleanPct     = r => !r.cleanInterval?0:Math.min((r.roundsSinceClean/r.cleanInterval)*100,100);
      const needsMoaWarn = r => { if (!r.moaThreshold||moaDismissed[r.id]) return false; const l=latestRifleMoa(r); return l!=null&&l>r.moaThreshold; };

      /* ── rifle actions ── */
      const createRifle = () => {
        if (!rifleForm.name) return;
        setRifles(prev=>[{ id:Date.now(), name:rifleForm.name, serial:rifleForm.serial, caliber:rifleForm.caliber,
          cleanInterval:parseInt(rifleForm.cleanInterval)||null, moaThreshold:parseFloat(rifleForm.moaThreshold)||null,
          roundsSinceClean:0, created:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}),
          cleanHistory:[], sessions:[], },...prev]);
        setRifleForm(EMPTY_RIFLE); setView("rifles");
      };
      const saveRifleEdit = () => {
        setRifles(prev=>prev.map(r=>r.id!==selRifleId?r:{...r, name:rifleForm.name, serial:rifleForm.serial, caliber:rifleForm.caliber,
          cleanInterval:parseInt(rifleForm.cleanInterval)||null, moaThreshold:parseFloat(rifleForm.moaThreshold)||null }));
        setEditingRifle(false);
      };
      const deleteRifle = id => { setRifles(prev=>prev.filter(r=>r.id!==id)); setView("rifles"); };
      const markCleaned = rifleId => {
        setRifles(prev=>prev.map(r=>r.id!==rifleId?r:{...r, roundsSinceClean:0,
          cleanHistory:[...r.cleanHistory,{ date:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}), atRound:totalRounds(r) }]}));
        setCleanDismissed(prev=>({...prev,[rifleId]:true}));
      };

      /* ── session actions ── */
      const createSession = () => {
        const now = new Date();
        const datePart = now.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
        const r = rifles.find(r=>r.id===selRifleId);
        const autoName = sessionForm.customName.trim() || `${r.name} · ${now.toLocaleDateString("en-US",{month:"short",day:"numeric"})}`;
        setRifles(prev=>prev.map(r=>r.id!==selRifleId?r:{...r, sessions:[{
          id:Date.now(), name:autoName,
          conditions:sessionForm.conditions, environmentals:sessionForm.environmentals,
          created:datePart, rangeEntries:[],
        },...r.sessions]}));
        setSessionForm(EMPTY_SESSION); setView("rifleDetail");
      };
      const saveSessionEdit = () => {
        setRifles(prev=>prev.map(r=>r.id!==selRifleId?r:{...r,sessions:r.sessions.map(s=>s.id!==selSessionId?s:{
          ...s, name:sessionForm.customName||s.name,
          conditions:sessionForm.conditions, environmentals:sessionForm.environmentals,
        })}));
        setEditingSession(false);
      };
      const deleteSession = sid => {
        const s = selRifle.sessions.find(s=>s.id===sid);
        const rds = s?s.rangeEntries.reduce((a,e)=>a+e.count,0):0;
        setRifles(prev=>prev.map(r=>r.id!==selRifleId?r:{...r, roundsSinceClean:Math.max(0,r.roundsSinceClean-rds), sessions:r.sessions.filter(s=>s.id!==sid)}));
        setView("rifleDetail");
      };

      /* ── entry actions ── */
      const addEntry = (rifleId, sessionId) => {
        const n = parseInt(entryForm.shots);
        if (!n||n<=0) return;
        const entry = { id:Date.now(), date:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"}),
          entryTitle:entryForm.entryTitle, count:n, moa:entryForm.moa!==""?parseFloat(entryForm.moa):null,
          isCustom:entryForm.isCustom, cartridgeType:entryForm.cartridgeType,
          brand:entryForm.brand, customName:entryForm.customName,
          bulletType:entryForm.bulletType, bulletWeight:entryForm.bulletWeight, bulletMfg:entryForm.bulletMfg,
          powderCharge:entryForm.powderCharge, powderMfg:entryForm.powderMfg, primerType:entryForm.primerType };
        setRifles(prev=>prev.map(r=>r.id!==rifleId?r:{...r, roundsSinceClean:r.roundsSinceClean+n,
          sessions:r.sessions.map(s=>s.id!==sessionId?s:{...s, rangeEntries:[...s.rangeEntries,entry]})}));
        setCleanDismissed(prev=>({...prev,[rifleId]:false}));
        setMoaDismissed(prev=>({...prev,[rifleId]:false}));
        setEntryForm(EMPTY_ENTRY); setAddingEntry(false);
      };
      const saveEntryEdit = (rifleId, sessionId) => {
        const old = selSession.rangeEntries.find(e=>e.id===editingEntryId);
        const diff = (parseInt(entryForm.shots)||0) - (old?old.count:0);
        setRifles(prev=>prev.map(r=>r.id!==rifleId?r:{...r, roundsSinceClean:Math.max(0,r.roundsSinceClean+diff),
          sessions:r.sessions.map(s=>s.id!==sessionId?s:{...s, rangeEntries:s.rangeEntries.map(e=>e.id!==editingEntryId?e:{
            ...e, entryTitle:entryForm.entryTitle, count:parseInt(entryForm.shots)||0,
            moa:entryForm.moa!==""?parseFloat(entryForm.moa):null,
            isCustom:entryForm.isCustom, cartridgeType:entryForm.cartridgeType,
            brand:entryForm.brand, customName:entryForm.customName,
            bulletType:entryForm.bulletType, bulletWeight:entryForm.bulletWeight, bulletMfg:entryForm.bulletMfg,
            powderCharge:entryForm.powderCharge, powderMfg:entryForm.powderMfg, primerType:entryForm.primerType,
          })})}));
        setMoaDismissed(prev=>({...prev,[rifleId]:false}));
        setEditingEntryId(null); setEntryForm(EMPTY_ENTRY);
      };
      const deleteEntry = (rifleId, sessionId, entryId) => {
        const entry = selSession.rangeEntries.find(e=>e.id===entryId);
        const n = entry?entry.count:0;
        setRifles(prev=>prev.map(r=>r.id!==rifleId?r:{...r, roundsSinceClean:Math.max(0,r.roundsSinceClean-n),
          sessions:r.sessions.map(s=>s.id!==sessionId?s:{...s, rangeEntries:s.rangeEntries.filter(e=>e.id!==entryId)})}));
        if (editingEntryId===entryId) { setEditingEntryId(null); setEntryForm(EMPTY_ENTRY); }
      };
      const startEditEntry = e => {
        setEditingEntryId(e.id); setAddingEntry(false);
        setEntryForm({ entryTitle:e.entryTitle||"", isCustom:e.isCustom||false, cartridgeType:e.cartridgeType||"rifle",
          brand:e.brand||"", customName:e.customName||"", bulletType:e.bulletType||"", bulletWeight:e.bulletWeight||"",
          bulletMfg:e.bulletMfg||"", powderCharge:e.powderCharge||"", powderMfg:e.powderMfg||"",
          primerType:e.primerType||"", shots:String(e.count||""), moa:e.moa!=null?String(e.moa):"" });
      };

      /* ── nav ── */
      const goRifles      = ()  => { setView("rifles"); setSelRifleId(null); setSelSessionId(null); setEditingRifle(false); };
      const goRifleDetail = id  => { setSelRifleId(id); setSelSessionId(null); setView("rifleDetail"); setAddingEntry(false); setEditingRifle(false); setEditingEntryId(null); };
      const goSession     = sid => { setSelSessionId(sid); setView("sessionDetail"); setAddingEntry(false); setEditingEntryId(null); setEntryForm(EMPTY_ENTRY); setEditingSession(false); };
      const goNewRifle    = ()  => { setRifleForm(EMPTY_RIFLE); setView("newRifle"); };
      const goNewSession  = ()  => { setSessionForm(EMPTY_SESSION); setView("newSession"); };
      const startEditRifle = r => { setRifleForm({name:r.name,serial:r.serial||"",caliber:r.caliber||"",cleanInterval:r.cleanInterval||"",moaThreshold:r.moaThreshold||""}); setEditingRifle(true); };
      const startEditSession = s => { setSessionForm({customName:s.name||"",conditions:s.conditions||"",environmentals:s.environmentals||""}); setEditingSession(true); };

      /* ── shared tiny components ── */
      const BackBtn = ({ label, to }) => (
        <button onClick={to} style={{background:"transparent",border:`1px solid ${T.border}`,borderRadius:8,color:T.gold,fontSize:11,fontWeight:700,fontFamily:T.mono,letterSpacing:"0.1em",padding:"7px 14px",cursor:"pointer"}}>{label}</button>
      );
      const SecHdr = ({ children, accent }) => (
        <div style={{display:"flex",alignItems:"center",gap:10,margin:"20px 22px 10px"}}>
          <div style={{width:2,height:14,background:`linear-gradient(180deg,${accent||T.gold},transparent)`}}/>
          <span style={{fontFamily:T.mono,fontSize:10,fontWeight:600,letterSpacing:"0.18em",color:accent||T.goldDim,textTransform:"uppercase"}}>{children}</span>
        </div>
      );
      const MoaBadge = ({ moa, threshold }) => {
        if (moa==null) return null;
        const over = threshold&&moa>threshold;
        return (
          <div style={{display:"inline-flex",alignItems:"center",gap:4,background:over?T.redDim:T.greenDim,border:`1px solid ${over?"rgba(239,68,68,0.35)":"rgba(74,222,128,0.3)"}`,borderRadius:6,padding:"3px 8px"}}>
            <span style={{fontFamily:T.mono,fontSize:11,fontWeight:700,color:over?T.red:T.green,letterSpacing:"0.06em"}}>{moa} MOA</span>
            {over&&<span style={{fontSize:9}}>⚠</span>}
          </div>
        );
      };
      const MoaSparkline = ({ entries, threshold, width=280, height=52 }) => {
        const moas=entries.map(e=>e.moa).filter(m=>m!=null);
        if (moas.length<2) return null;
        const mn=Math.min(...moas,0),mx=Math.max(...moas,threshold||0)*1.15,rng=mx-mn||1;
        const pts=moas.map((m,i)=>`${(i/(moas.length-1))*width},${height-((m-mn)/rng)*height}`).join(" ");
        const thY=threshold?height-((threshold-mn)/rng)*height:null;
        return (
          <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{overflow:"visible"}}>
            {thY!=null&&<><line x1="0" y1={thY} x2={width} y2={thY} stroke={T.red} strokeWidth="1" strokeDasharray="4,3" opacity="0.5"/>
              <text x={width-2} y={thY-4} fill={T.red} fontSize="8" fontFamily={T.mono} textAnchor="end" opacity="0.7">THRESHOLD</text></>}
            <polyline points={pts} fill="none" stroke={T.gold} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round" opacity="0.9"/>
            {moas.map((m,i)=>{ const x=(i/(moas.length-1))*width,y=height-((m-mn)/rng)*height;
              return <circle key={i} cx={x} cy={y} r="3" fill={threshold&&m>threshold?T.red:T.gold}/>; })}
          </svg>
        );
      };

      /* ════════════════ RENDER ════════════════ */
      return (
        <div style={{display:"flex",justifyContent:"center",alignItems:"center",minHeight:"100vh",background:lightMode?"#e8e8ec":"#060607",fontFamily:T.body}}>
          <div style={{width:390,minHeight:844,background:T.bg,borderRadius:52,border:`9px solid ${T.phone}`,boxShadow:`0 0 0 1.5px ${T.border},0 60px 120px ${T.phoneGlow},inset 0 1px 0 rgba(255,255,255,${lightMode?0.8:0.04})`,overflow:"hidden",display:"flex",flexDirection:"column",position:"relative"}}>

            {!lightMode&&<div style={{position:"absolute",inset:0,backgroundImage:noise,backgroundSize:"256px 256px",pointerEvents:"none",zIndex:0}}/>}

            {/* Status bar */}
            <div style={{position:"relative",zIndex:1,display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 28px 0",color:T.statusText,fontSize:11,fontFamily:T.mono,fontWeight:600,letterSpacing:"0.06em"}}>
              <span>09:41</span>
              <div style={{width:110,height:28,background:T.bg,borderRadius:20,position:"absolute",left:"50%",transform:"translateX(-50%)",top:0}}/>
              <span>▋▋▋▋ ⌁</span>
            </div>

            {/* Scroll area */}
            <div style={{position:"relative",zIndex:1,flex:1,overflowY:"auto",paddingBottom:36}}>

              {/* ══════ RIFLES LIST ══════ */}
              {view==="rifles"&&(
                <div>
                  <div style={{padding:"28px 22px 18px"}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <div style={{width:2,height:20,background:`linear-gradient(180deg,${T.gold},transparent)`}}/>
                        <span style={{fontFamily:T.mono,fontSize:10,letterSpacing:"0.2em",color:T.goldDim,textTransform:"uppercase"}}>Ballistic Log · v4</span>
                      </div>
                      {/* ── Settings / Theme toggle ── */}
                      <button onClick={()=>setLightMode(l=>!l)}
                        style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,padding:"8px 12px",cursor:"pointer",fontFamily:T.mono,fontSize:10,color:T.textMid,letterSpacing:"0.08em",display:"flex",alignItems:"center",gap:6}}>
                        {lightMode?"🌑 DARK":"☀️ LIGHT"}
                      </button>
                    </div>
                    <div style={{fontFamily:T.display,fontSize:46,color:T.text,lineHeight:1,letterSpacing:"0.04em"}}>RIFLES</div>
                    <div style={{fontFamily:T.mono,fontSize:11,color:T.textMid,marginTop:6,letterSpacing:"0.08em"}}>
                      {rifles.length} RIFLE{rifles.length!==1?"S":""} · {rifles.reduce((a,r)=>a+totalRounds(r),0).toLocaleString()} TOTAL RDS
                    </div>
                  </div>

                  {/* Alerts */}
                  {rifles.filter(r=>needsClean(r)||needsMoaWarn(r)).map(r=>(
                    <div key={r.id}>
                      {needsClean(r)&&<div onClick={()=>goRifleDetail(r.id)} style={{margin:"0 22px 8px",background:T.amberDim,border:"1px solid rgba(245,158,11,0.3)",borderRadius:12,padding:"12px 16px",display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}>
                        <span style={{fontSize:16}}>🧹</span>
                        <div style={{flex:1}}>
                          <div style={{fontFamily:T.mono,fontSize:11,fontWeight:700,color:T.amber,letterSpacing:"0.08em"}}>CLEAN BARREL — {r.name.toUpperCase()}</div>
                          <div style={{fontFamily:T.mono,fontSize:10,color:T.amber,opacity:0.7,marginTop:2}}>{r.roundsSinceClean} RDS SINCE LAST CLEAN</div>
                        </div><span style={{color:T.amber}}>›</span>
                      </div>}
                      {needsMoaWarn(r)&&<div onClick={()=>goRifleDetail(r.id)} style={{margin:"0 22px 8px",background:T.redDim,border:"1px solid rgba(239,68,68,0.3)",borderRadius:12,padding:"12px 16px",display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}>
                        <span style={{fontSize:16}}>🎯</span>
                        <div style={{flex:1}}>
                          <div style={{fontFamily:T.mono,fontSize:11,fontWeight:700,color:T.red,letterSpacing:"0.08em"}}>ACCURACY ALERT — {r.name.toUpperCase()}</div>
                          <div style={{fontFamily:T.mono,fontSize:10,color:T.red,opacity:0.7,marginTop:2}}>LAST GROUP {latestRifleMoa(r)} MOA · THRESHOLD {r.moaThreshold} MOA</div>
                        </div><span style={{color:T.red}}>›</span>
                      </div>}
                    </div>
                  ))}

                  {/* Rifle cards */}
                  <div style={{padding:"0 22px",display:"flex",flexDirection:"column",gap:10}}>
                    {rifles.length===0&&(
                      <div style={{textAlign:"center",padding:"60px 20px 30px"}}>
                        <div style={{fontFamily:T.display,fontSize:26,color:T.textDim,letterSpacing:"0.1em"}}>NO RIFLES YET</div>
                        <div style={{fontFamily:T.mono,fontSize:11,color:T.textDim,marginTop:8,letterSpacing:"0.08em"}}>ADD YOUR FIRST RIFLE TO BEGIN</div>
                      </div>
                    )}
                    {rifles.map(r=>{
                      const dirty=needsClean(r),moaWarn=needsMoaWarn(r);
                      const total=totalRounds(r),pct=cleanPct(r),lMoa=latestRifleMoa(r);
                      const metric=getRifleMetric(r),bg=findBestAmmoGroup(r,metric);
                      const ac=moaWarn?T.red:dirty?T.amber:T.gold;
                      return (
                        <div key={r.id} onClick={()=>goRifleDetail(r.id)} style={{background:T.surface,border:`1px solid ${moaWarn?"rgba(239,68,68,0.4)":dirty?"rgba(245,158,11,0.35)":T.border}`,borderRadius:14,padding:"16px 18px",cursor:"pointer",position:"relative",overflow:"hidden"}}>
                          <div style={{position:"absolute",top:0,left:0,width:3,height:"100%",background:`linear-gradient(180deg,${ac},transparent)`,borderRadius:"14px 0 0 14px"}}/>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginLeft:8}}>
                            <div style={{flex:1}}>
                              <div style={{fontFamily:T.display,fontSize:22,color:T.text,letterSpacing:"0.06em",lineHeight:1.1}}>{r.name.toUpperCase()}</div>
                              {r.serial&&<div style={{fontFamily:T.mono,fontSize:10,color:T.goldDim,marginTop:3,letterSpacing:"0.12em"}}>S/N {r.serial}</div>}
                              {r.caliber&&<div style={{fontFamily:T.mono,fontSize:11,color:T.textMid,marginTop:2}}>{r.caliber}</div>}
                              {lMoa!=null&&<div style={{marginTop:6}}><MoaBadge moa={lMoa} threshold={r.moaThreshold}/></div>}
                            </div>
                            <div style={{textAlign:"right"}}>
                              <div style={{fontFamily:T.display,fontSize:34,color:T.gold,letterSpacing:"0.04em",lineHeight:1}}>{total.toLocaleString()}</div>
                              <div style={{fontFamily:T.mono,fontSize:9,color:T.textDim,letterSpacing:"0.12em",marginTop:2}}>TOTAL RDS</div>
                            </div>
                          </div>
                          {bg&&<div style={{marginLeft:8,marginTop:8,display:"flex",alignItems:"center",gap:6}}>
                            <span style={{fontSize:11}}>🏆</span>
                            <span style={{fontFamily:T.mono,fontSize:9,color:T.green,letterSpacing:"0.08em"}}>BEST: {entryAmmoName(bg.proto)}{groupMetricVal(bg,metric)!=null?` · ${groupMetricVal(bg,metric)} MOA`:""}</span>
                          </div>}
                          {r.cleanInterval&&<div style={{marginLeft:8,marginTop:8}}>
                            <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                              <span style={{fontFamily:T.mono,fontSize:9,color:dirty?T.amber:T.textDim,letterSpacing:"0.1em"}}>{dirty?"⚠ CLEAN NEEDED":`${r.roundsSinceClean}/${r.cleanInterval} SINCE CLEAN`}</span>
                              <span style={{fontFamily:T.mono,fontSize:9,color:T.textDim}}>{Math.round(pct)}%</span>
                            </div>
                            <div style={{height:3,background:T.card,borderRadius:2,overflow:"hidden"}}>
                              <div style={{height:"100%",width:`${pct}%`,background:pct>=100?T.amber:pct>75?"#f97316":T.gold,borderRadius:2}}/>
                            </div>
                          </div>}
                          <div style={{display:"flex",justifyContent:"space-between",marginTop:10,marginLeft:8,paddingTop:8,borderTop:`1px solid ${T.border}`}}>
                            <span style={{fontFamily:T.mono,fontSize:9,color:T.textDim}}>ADDED {r.created.toUpperCase()}</span>
                            <span style={{fontFamily:T.mono,fontSize:9,color:T.textDim}}>{r.sessions.length} SESSION{r.sessions.length!==1?"S":""} ›</span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                  <div style={{padding:"20px 22px 0"}}>
                    <button onClick={goNewRifle} style={{width:"100%",padding:"17px",background:`linear-gradient(135deg,${T.gold},#9d6f2a)`,border:"none",borderRadius:12,color:T.isLight?"#fff":"#0c0c0d",fontSize:13,fontWeight:700,fontFamily:T.mono,letterSpacing:"0.15em",cursor:"pointer"}}>+ ADD RIFLE</button>
                  </div>
                </div>
              )}

              {/* ══════ NEW RIFLE ══════ */}
              {view==="newRifle"&&(
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:14,padding:"28px 22px 22px"}}>
                    <BackBtn label="← RIFLES" to={goRifles}/>
                    <div style={{fontFamily:T.display,fontSize:28,color:T.text,letterSpacing:"0.06em"}}>NEW RIFLE</div>
                  </div>
                  <div style={{padding:"0 22px 20px"}}>
                    <RifleFormFields form={rifleForm} setForm={setRifleForm} T={T}/>
                    <button onClick={createRifle} disabled={!rifleForm.name}
                      style={{width:"100%",padding:"17px",marginTop:16,background:!rifleForm.name?T.card:`linear-gradient(135deg,${T.gold},#9d6f2a)`,border:`1px solid ${!rifleForm.name?T.border:"transparent"}`,borderRadius:12,color:!rifleForm.name?T.textDim:(T.isLight?"#fff":"#0c0c0d"),fontSize:13,fontWeight:700,fontFamily:T.mono,letterSpacing:"0.15em",cursor:!rifleForm.name?"not-allowed":"pointer"}}>
                      CREATE RIFLE PROFILE
                    </button>
                  </div>
                </div>
              )}

              {/* ══════ RIFLE DETAIL ══════ */}
              {view==="rifleDetail"&&selRifle&&(()=>{
                const r=selRifle;
                const dirty=needsClean(r),moaWarn=needsMoaWarn(r);
                const total=totalRounds(r),lMoa=latestRifleMoa(r),bMoa=bestRifleMoa(r);
                const allEntries=allRifleMoaEntries(r);
                const metric=getRifleMetric(r),bg=findBestAmmoGroup(r,metric);
                return (
                  <div>
                    <div style={{padding:"28px 22px 0"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
                        <BackBtn label="← RIFLES" to={goRifles}/>
                        <div style={{display:"flex",gap:8}}>
                          <button onClick={()=>startEditRifle(r)} style={{background:T.goldGlow,border:`1px solid ${T.goldDim}`,borderRadius:8,color:T.gold,fontSize:11,fontFamily:T.mono,letterSpacing:"0.1em",padding:"7px 14px",cursor:"pointer"}}>EDIT</button>
                          <button onClick={()=>deleteRifle(r.id)} style={{background:T.redDim,border:`1px solid rgba(239,68,68,0.25)`,borderRadius:8,color:T.red,fontSize:11,fontFamily:T.mono,letterSpacing:"0.1em",padding:"7px 14px",cursor:"pointer"}}>DELETE</button>
                        </div>
                      </div>
                      {editingRifle&&(
                        <div style={{background:T.surface,border:`1px solid ${T.goldDim}`,borderRadius:14,padding:"16px",marginBottom:20}}>
                          <div style={{fontFamily:T.mono,fontSize:10,color:T.gold,letterSpacing:"0.16em",marginBottom:14}}>EDIT PROFILE</div>
                          <RifleFormFields form={rifleForm} setForm={setRifleForm} T={T}/>
                          <div style={{display:"flex",gap:8,marginTop:14}}>
                            <button onClick={saveRifleEdit} style={{flex:1,padding:"13px",background:`linear-gradient(135deg,${T.gold},#9d6f2a)`,border:"none",borderRadius:10,color:T.isLight?"#fff":"#0c0c0d",fontSize:12,fontWeight:700,fontFamily:T.mono,letterSpacing:"0.12em",cursor:"pointer"}}>SAVE CHANGES</button>
                            <button onClick={()=>setEditingRifle(false)} style={{padding:"13px 16px",background:"transparent",border:`1px solid ${T.border}`,borderRadius:10,color:T.textMid,cursor:"pointer",fontSize:16}}>✕</button>
                          </div>
                        </div>
                      )}
                      <div style={{fontFamily:T.mono,fontSize:10,color:T.goldDim,letterSpacing:"0.2em",marginBottom:6}}>TARGET RIFLE</div>
                      <div style={{fontFamily:T.display,fontSize:38,color:T.text,letterSpacing:"0.05em",lineHeight:1}}>{r.name.toUpperCase()}</div>
                      {r.serial&&<div style={{fontFamily:T.mono,fontSize:11,color:T.goldDim,marginTop:6,letterSpacing:"0.14em"}}>S/N {r.serial}</div>}
                      {r.caliber&&<div style={{fontFamily:T.mono,fontSize:12,color:T.textMid,marginTop:4}}>{r.caliber}</div>}
                      <div style={{fontFamily:T.mono,fontSize:10,color:T.textDim,marginTop:4}}>ADDED {r.created.toUpperCase()}</div>
                    </div>

                    {moaWarn&&!editingRifle&&(
                      <div style={{margin:"18px 22px 0",background:T.redDim,border:"1px solid rgba(239,68,68,0.4)",borderRadius:14,padding:"18px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
                          <span style={{fontSize:26}}>🎯</span>
                          <div>
                            <div style={{fontFamily:T.display,fontSize:20,color:T.red,letterSpacing:"0.06em"}}>ACCURACY DEGRADED</div>
                            <div style={{fontFamily:T.mono,fontSize:10,color:T.red,opacity:0.7,marginTop:4}}>LAST GROUP: {lMoa} MOA · THRESHOLD: {r.moaThreshold} MOA</div>
                          </div>
                        </div>
                        <button onClick={()=>setMoaDismissed(prev=>({...prev,[r.id]:true}))} style={{width:"100%",padding:"12px",background:T.redDim,border:`1px solid rgba(239,68,68,0.4)`,borderRadius:10,color:T.red,fontSize:11,fontWeight:700,fontFamily:T.mono,letterSpacing:"0.12em",cursor:"pointer"}}>DISMISS WARNING</button>
                      </div>
                    )}
                    {dirty&&!editingRifle&&(
                      <div style={{margin:"12px 22px 0",background:T.amberDim,border:"1px solid rgba(245,158,11,0.35)",borderRadius:14,padding:"18px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
                          <span style={{fontSize:24}}>🧹</span>
                          <div>
                            <div style={{fontFamily:T.display,fontSize:20,color:T.amber,letterSpacing:"0.06em"}}>CLEAN YOUR BARREL</div>
                            <div style={{fontFamily:T.mono,fontSize:10,color:T.amber,opacity:0.7,marginTop:4}}>{r.roundsSinceClean} RDS SINCE CLEAN · INTERVAL {r.cleanInterval}</div>
                          </div>
                        </div>
                        <button onClick={()=>markCleaned(r.id)} style={{width:"100%",padding:"13px",background:T.amber,border:"none",borderRadius:10,color:"#0c0c0d",fontSize:12,fontWeight:700,fontFamily:T.mono,letterSpacing:"0.14em",cursor:"pointer"}}>✓ MARK AS CLEANED</button>
                      </div>
                    )}

                    {/* Stats */}
                    <div style={{display:"flex",gap:8,margin:"18px 22px 0"}}>
                      {[{label:"Total Rds",value:total.toLocaleString(),color:T.gold,glow:"rgba(201,169,110,0.08)"},
                        {label:"Sessions",value:r.sessions.length,color:T.blue,glow:"rgba(96,165,250,0.06)"},
                        {label:"Best MOA",value:bMoa!=null?`${bMoa}`:"—",color:T.green,glow:"rgba(74,222,128,0.06)"}
                      ].map((c,i)=>(
                        <div key={i} style={{flex:1,background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,padding:"14px 10px",textAlign:"center",position:"relative",overflow:"hidden"}}>
                          <div style={{position:"absolute",inset:0,background:`radial-gradient(circle at 50% 0%,${c.glow},transparent 70%)`}}/>
                          <div style={{fontFamily:T.display,fontSize:26,color:c.color,lineHeight:1,position:"relative"}}>{c.value}</div>
                          <div style={{fontFamily:T.mono,fontSize:9,color:T.textDim,letterSpacing:"0.12em",textTransform:"uppercase",marginTop:4,position:"relative"}}>{c.label}</div>
                        </div>
                      ))}
                    </div>

                    {/* Best load card */}
                    <div style={{margin:"12px 22px 0",background:T.surface,border:`1px solid ${bg?"rgba(74,222,128,0.35)":T.border}`,borderRadius:14,overflow:"hidden"}}>
                      <div style={{padding:"12px 16px",borderBottom:`1px solid ${T.border}`}}>
                        <div style={{fontFamily:T.mono,fontSize:10,color:T.textMid,letterSpacing:"0.14em",marginBottom:10}}>BEST LOAD RANKED BY</div>
                        <div style={{display:"flex",gap:6}}>
                          {BEST_METRICS.map(m=>(
                            <button key={m.key} onClick={()=>setBestMetric(prev=>({...prev,[r.id]:m.key}))}
                              style={{flex:1,padding:"8px 4px",borderRadius:8,cursor:"pointer",fontFamily:T.mono,fontSize:9,fontWeight:600,letterSpacing:"0.04em",border:metric===m.key?`1px solid ${T.green}`:`1px solid ${T.border}`,background:metric===m.key?"rgba(74,222,128,0.1)":"transparent",color:metric===m.key?T.green:T.textMid,transition:"all 0.12s",textAlign:"center"}}>
                              {m.label}
                            </button>
                          ))}
                        </div>
                        <div style={{fontFamily:T.mono,fontSize:9,color:T.textDim,marginTop:6,letterSpacing:"0.04em"}}>{BEST_METRICS.find(m=>m.key===metric)?.desc}</div>
                      </div>
                      {bg?(
                        <div style={{padding:"14px 16px"}}>
                          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                            <span style={{fontSize:18}}>🏆</span>
                            <span style={{fontFamily:T.mono,fontSize:10,color:T.green,letterSpacing:"0.14em",fontWeight:700}}>BEST PERFORMING LOAD</span>
                          </div>
                          <div style={{fontFamily:T.display,fontSize:22,color:T.text,letterSpacing:"0.06em"}}>{entryAmmoName(bg.proto).toUpperCase()}</div>
                          {bg.proto.bulletWeight&&<div style={{fontFamily:T.mono,fontSize:11,color:T.textMid,marginTop:3}}>{bg.proto.bulletWeight}{bg.proto.bulletType?` · ${bg.proto.bulletType}`:""}{bg.proto.bulletMfg?` · ${bg.proto.bulletMfg}`:""}</div>}
                          {bg.proto.powderCharge&&<div style={{fontFamily:T.mono,fontSize:10,color:T.textDim,marginTop:2}}>{bg.proto.powderCharge}{bg.proto.powderMfg?` ${bg.proto.powderMfg}`:""}{bg.proto.primerType?` · ${bg.proto.primerType}`:""}</div>}
                          <div style={{display:"flex",alignItems:"center",gap:8,marginTop:10,flexWrap:"wrap"}}>
                            {metric==="stdDev"?(
                              <div style={{display:"inline-flex",alignItems:"center",gap:4,background:T.purpleDim,border:"1px solid rgba(167,139,250,0.3)",borderRadius:6,padding:"3px 8px"}}>
                                <span style={{fontFamily:T.mono,fontSize:11,fontWeight:700,color:T.purple}}>σ {groupStdDev(bg)} MOA</span>
                              </div>
                            ):(<MoaBadge moa={groupMetricVal(bg,metric)} threshold={r.moaThreshold}/>)}
                            <span style={{fontFamily:T.mono,fontSize:9,color:T.textDim}}>ACROSS {bg.entries.filter(e=>e.moa!=null).length} GROUP{bg.entries.filter(e=>e.moa!=null).length!==1?"S":""}</span>
                          </div>
                        </div>
                      ):(
                        <div style={{padding:"16px",fontFamily:T.mono,fontSize:10,color:T.textDim,textAlign:"center",letterSpacing:"0.08em"}}>LOG GROUP SIZES TO SEE BEST LOAD</div>
                      )}
                    </div>

                    {/* Sparkline */}
                    {allEntries.length>=2&&(
                      <div style={{margin:"12px 22px 0",background:T.surface,border:`1px solid ${T.border}`,borderRadius:14,padding:"16px 18px"}}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
                          <span style={{fontFamily:T.mono,fontSize:11,color:T.textMid,letterSpacing:"0.08em"}}>MOA TREND — ALL SESSIONS</span>
                          {r.moaThreshold&&<span style={{fontFamily:T.mono,fontSize:10,color:T.red,opacity:0.7}}>— {r.moaThreshold} THRESHOLD</span>}
                        </div>
                        <MoaSparkline entries={allEntries} threshold={r.moaThreshold} width={296} height={60}/>
                      </div>
                    )}

                    {/* Barrel clean tracker */}
                    {r.cleanInterval&&(
                      <div style={{margin:"12px 22px 0",background:T.surface,border:`1px solid ${dirty?"rgba(245,158,11,0.3)":T.border}`,borderRadius:14,padding:"16px 18px"}}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                          <span style={{fontFamily:T.mono,fontSize:11,fontWeight:700,color:dirty?T.amber:T.textMid}}>🧹 BARREL CLEAN</span>
                          <span style={{fontFamily:T.mono,fontSize:11,color:T.textDim}}>{r.roundsSinceClean} / {r.cleanInterval} RDS</span>
                        </div>
                        <div style={{height:5,background:T.card,borderRadius:3,overflow:"hidden"}}>
                          <div style={{height:"100%",width:`${cleanPct(r)}%`,background:cleanPct(r)>=100?T.amber:cleanPct(r)>75?"#f97316":T.gold,borderRadius:3,transition:"width 0.4s"}}/>
                        </div>
                        <div style={{display:"flex",justifyContent:"space-between",marginTop:8}}>
                          <span style={{fontFamily:T.mono,fontSize:10,color:T.textDim}}>{dirty?"⚠ CLEAN REQUIRED":`${r.cleanInterval-r.roundsSinceClean} RDS UNTIL NEXT CLEAN`}</span>
                          <span style={{fontFamily:T.mono,fontSize:10,color:T.textDim}}>{Math.round(cleanPct(r))}%</span>
                        </div>
                        {!dirty&&<button onClick={()=>markCleaned(r.id)} style={{marginTop:10,width:"100%",padding:"10px",background:"transparent",border:`1px solid ${T.border}`,borderRadius:8,color:T.textMid,fontSize:11,fontFamily:T.mono,letterSpacing:"0.1em",cursor:"pointer"}}>MARK AS CLEANED NOW</button>}
                      </div>
                    )}

                    {/* Sessions */}
                    <SecHdr>Sessions</SecHdr>
                    <div style={{padding:"0 22px",display:"flex",flexDirection:"column",gap:10}}>
                      {r.sessions.length===0&&(
                        <div style={{textAlign:"center",padding:"24px 20px",background:T.surface,border:`1px solid ${T.border}`,borderRadius:14}}>
                          <div style={{fontFamily:T.mono,fontSize:11,color:T.textDim,letterSpacing:"0.08em"}}>NO SESSIONS YET</div>
                        </div>
                      )}
                      {r.sessions.map(s=>{
                        const sTotal=s.rangeEntries.reduce((a,e)=>a+e.count,0);
                        const sBest=sessionBestMoa(s);
                        const overMoa=r.moaThreshold&&sBest!=null&&sBest>r.moaThreshold;
                        return (
                          <div key={s.id} onClick={()=>goSession(s.id)} style={{background:T.surface,border:`1px solid ${overMoa?"rgba(239,68,68,0.35)":T.border}`,borderRadius:14,padding:"15px 18px",cursor:"pointer",position:"relative",overflow:"hidden"}}>
                            <div style={{position:"absolute",top:0,left:0,width:3,height:"100%",background:`linear-gradient(180deg,${overMoa?T.red:T.blue},transparent)`,borderRadius:"14px 0 0 14px"}}/>
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginLeft:8}}>
                              <div style={{flex:1}}>
                                <div style={{fontFamily:T.display,fontSize:18,color:T.text,letterSpacing:"0.06em"}}>{s.name.toUpperCase()}</div>
                                <div style={{fontFamily:T.mono,fontSize:10,color:T.textMid,marginTop:2}}>{s.rangeEntries.length} AMMO ENTR{s.rangeEntries.length!==1?"IES":"Y"}</div>
                                {sBest!=null&&<div style={{marginTop:5}}><MoaBadge moa={sBest} threshold={r.moaThreshold}/></div>}
                              </div>
                              <div style={{textAlign:"right",flexShrink:0,marginLeft:8}}>
                                <div style={{fontFamily:T.display,fontSize:28,color:T.blue,lineHeight:1}}>{sTotal.toLocaleString()}</div>
                                <div style={{fontFamily:T.mono,fontSize:9,color:T.textDim,marginTop:2}}>RDS</div>
                              </div>
                            </div>
                            <div style={{display:"flex",justifyContent:"space-between",marginTop:10,marginLeft:8,paddingTop:8,borderTop:`1px solid ${T.border}`}}>
                              <span style={{fontFamily:T.mono,fontSize:9,color:T.textDim}}>{s.created}</span>
                              <span style={{fontFamily:T.mono,fontSize:9,color:T.textDim}}>VIEW ›</span>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                    <div style={{padding:"16px 22px 0"}}>
                      <button onClick={goNewSession} style={{width:"100%",padding:"16px",background:T.goldGlow,border:`1px solid ${T.goldDim}`,borderRadius:12,color:T.gold,fontSize:12,fontWeight:700,fontFamily:T.mono,letterSpacing:"0.14em",cursor:"pointer"}}>+ NEW SESSION</button>
                    </div>
                    {r.cleanHistory.length>0&&(
                      <div style={{margin:"20px 22px 0"}}>
                        <div style={{fontFamily:T.mono,fontSize:10,fontWeight:600,letterSpacing:"0.14em",color:T.textMid,textTransform:"uppercase",marginBottom:8}}>Clean History</div>
                        <div style={{display:"flex",flexDirection:"column",gap:8}}>
                          {[...r.cleanHistory].reverse().map((c,i)=>(
                            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,padding:"11px 16px"}}>
                              <span style={{fontFamily:T.mono,fontSize:11,color:T.textMid}}>🧹 {c.date.toUpperCase()}</span>
                              <span style={{fontFamily:T.mono,fontSize:11,color:T.amber,fontWeight:700}}>@ {c.atRound.toLocaleString()} RDS</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                );
              })()}

              {/* ══════ NEW SESSION ══════ */}
              {view==="newSession"&&selRifle&&(
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:14,padding:"28px 22px 22px"}}>
                    <BackBtn label="← RIFLE" to={()=>setView("rifleDetail")}/>
                    <div>
                      <div style={{fontFamily:T.display,fontSize:26,color:T.text,letterSpacing:"0.06em"}}>NEW SESSION</div>
                      <div style={{fontFamily:T.mono,fontSize:10,color:T.goldDim,letterSpacing:"0.12em"}}>{selRifle.name.toUpperCase()}</div>
                    </div>
                  </div>
                  <div style={{padding:"0 22px",display:"flex",flexDirection:"column",gap:14}}>
                    <div>
                      {lbl("Session Name (optional)")}
                      {inp(sessionForm.customName, e=>setSessionForm({...sessionForm,customName:e.target.value}), `e.g. ${selRifle.name} · ${new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"})}`)}
                      <div style={{fontFamily:T.mono,fontSize:9,color:T.textDim,marginTop:5,letterSpacing:"0.05em"}}>Leave blank to auto-name with rifle + date</div>
                    </div>
                    <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,overflow:"hidden"}}>
                      <div style={{padding:"10px 14px",borderBottom:`1px solid ${T.border}`}}>
                        <span style={{fontFamily:T.mono,fontSize:10,color:T.textMid,letterSpacing:"0.14em",fontWeight:700}}>RANGE NOTES — OPTIONAL</span>
                      </div>
                      <div style={{padding:"14px",display:"flex",flexDirection:"column",gap:12}}>
                        <div>{lbl("Conditions")}{textarea(sessionForm.conditions,e=>setSessionForm({...sessionForm,conditions:e.target.value}),"Range, target distance, lighting…")}</div>
                        <div>{lbl("Environmentals")}{textarea(sessionForm.environmentals,e=>setSessionForm({...sessionForm,environmentals:e.target.value}),"Temperature, wind, humidity, altitude…")}</div>
                      </div>
                    </div>
                    <button onClick={createSession} style={{width:"100%",padding:"17px",background:`linear-gradient(135deg,${T.gold},#9d6f2a)`,border:"none",borderRadius:12,color:T.isLight?"#fff":"#0c0c0d",fontSize:13,fontWeight:700,fontFamily:T.mono,letterSpacing:"0.15em",cursor:"pointer",marginBottom:8}}>
                      CREATE SESSION
                    </button>
                  </div>
                </div>
              )}

              {/* ══════ SESSION DETAIL ══════ */}
              {view==="sessionDetail"&&selRifle&&selSession&&(()=>{
                const r=selRifle, s=selSession;
                const sTotal=s.rangeEntries.reduce((a,e)=>a+e.count,0);
                const sAvg=sessionAvgMoa(s), sBest=sessionBestMoa(s);
                const allMoa=s.rangeEntries.filter(e=>e.moa!=null);
                return (
                  <div>
                    <div style={{padding:"28px 22px 0"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
                        <BackBtn label="← SESSIONS" to={()=>setView("rifleDetail")}/>
                        <div style={{display:"flex",gap:8}}>
                          <button onClick={()=>startEditSession(s)} style={{background:T.goldGlow,border:`1px solid ${T.goldDim}`,borderRadius:8,color:T.gold,fontSize:11,fontFamily:T.mono,letterSpacing:"0.1em",padding:"7px 14px",cursor:"pointer"}}>EDIT</button>
                          <button onClick={()=>deleteSession(s.id)} style={{background:T.redDim,border:`1px solid rgba(239,68,68,0.25)`,borderRadius:8,color:T.red,fontSize:11,fontFamily:T.mono,letterSpacing:"0.1em",padding:"7px 14px",cursor:"pointer"}}>DELETE</button>
                        </div>
                      </div>

                      {/* Session inline edit */}
                      {editingSession&&(
                        <div style={{background:T.surface,border:`1px solid ${T.goldDim}`,borderRadius:14,padding:"14px",marginBottom:16}}>
                          <div style={{fontFamily:T.mono,fontSize:10,color:T.gold,letterSpacing:"0.14em",marginBottom:12}}>EDIT SESSION</div>
                          <div style={{display:"flex",flexDirection:"column",gap:10}}>
                            <div>{lbl("Session Name")}{inp(sessionForm.customName,e=>setSessionForm({...sessionForm,customName:e.target.value}),"Session name…")}</div>
                            <div>{lbl("Conditions")}{textarea(sessionForm.conditions,e=>setSessionForm({...sessionForm,conditions:e.target.value}),"Conditions…")}</div>
                            <div>{lbl("Environmentals")}{textarea(sessionForm.environmentals,e=>setSessionForm({...sessionForm,environmentals:e.target.value}),"Environmentals…")}</div>
                          </div>
                          <div style={{display:"flex",gap:8,marginTop:12}}>
                            <button onClick={saveSessionEdit} style={{flex:1,padding:"12px",background:`linear-gradient(135deg,${T.gold},#9d6f2a)`,border:"none",borderRadius:9,color:T.isLight?"#fff":"#0c0c0d",fontSize:12,fontWeight:700,fontFamily:T.mono,letterSpacing:"0.12em",cursor:"pointer"}}>SAVE</button>
                            <button onClick={()=>setEditingSession(false)} style={{padding:"12px 14px",background:"transparent",border:`1px solid ${T.border}`,borderRadius:9,color:T.textMid,cursor:"pointer",fontSize:15}}>✕</button>
                          </div>
                        </div>
                      )}

                      <div style={{fontFamily:T.mono,fontSize:10,color:T.goldDim,letterSpacing:"0.2em",marginBottom:6}}>{r.name.toUpperCase()}{r.caliber?` · ${r.caliber}`:""}</div>
                      <div style={{fontFamily:T.display,fontSize:28,color:T.text,letterSpacing:"0.05em",lineHeight:1.1}}>{s.name.toUpperCase()}</div>
                      <div style={{fontFamily:T.mono,fontSize:10,color:T.textDim,marginTop:4}}>{s.created}</div>
                    </div>

                    {/* Session stats */}
                    <div style={{display:"flex",gap:8,margin:"18px 22px 0"}}>
                      {[{label:"Rounds",value:sTotal.toLocaleString(),color:T.gold,glow:"rgba(201,169,110,0.08)"},
                        {label:"Avg Group",value:sAvg!=null?`${sAvg} MOA`:"—",color:T.green,glow:"rgba(74,222,128,0.06)"},
                        {label:"Best Group",value:sBest!=null?`${sBest} MOA`:"—",color:T.blue,glow:"rgba(96,165,250,0.06)"}
                      ].map((c,i)=>(
                        <div key={i} style={{flex:1,background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,padding:"14px 8px",textAlign:"center",position:"relative",overflow:"hidden"}}>
                          <div style={{position:"absolute",inset:0,background:`radial-gradient(circle at 50% 0%,${c.glow},transparent 70%)`}}/>
                          <div style={{fontFamily:i>0?T.mono:T.display,fontSize:i>0?11:22,color:c.color,lineHeight:1,position:"relative",fontWeight:i>0?700:400}}>{c.value}</div>
                          <div style={{fontFamily:T.mono,fontSize:9,color:T.textDim,letterSpacing:"0.1em",textTransform:"uppercase",marginTop:4,position:"relative"}}>{c.label}</div>
                        </div>
                      ))}
                    </div>

                    {allMoa.length>=2&&(
                      <div style={{margin:"12px 22px 0",background:T.surface,border:`1px solid ${T.border}`,borderRadius:14,padding:"16px 18px"}}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
                          <span style={{fontFamily:T.mono,fontSize:11,color:T.textMid,letterSpacing:"0.08em"}}>GROUP MOA — THIS SESSION</span>
                          {r.moaThreshold&&<span style={{fontFamily:T.mono,fontSize:10,color:T.red,opacity:0.7}}>— {r.moaThreshold}</span>}
                        </div>
                        <MoaSparkline entries={allMoa} threshold={r.moaThreshold} width={296} height={60}/>
                      </div>
                    )}
                    {s.conditions&&(
                      <div style={{margin:"12px 22px 0",background:T.surface,border:`1px solid ${T.border}`,borderRadius:14,padding:"16px 18px"}}>
                        <div style={{fontFamily:T.mono,fontSize:10,fontWeight:600,letterSpacing:"0.14em",color:T.textMid,textTransform:"uppercase",marginBottom:7}}>Conditions</div>
                        <div style={{color:T.textMid,fontSize:14,lineHeight:1.6}}>{s.conditions}</div>
                      </div>
                    )}
                    {s.environmentals&&(
                      <div style={{margin:"12px 22px 0",background:T.surface,border:`1px solid ${T.border}`,borderRadius:14,padding:"16px 18px"}}>
                        <div style={{fontFamily:T.mono,fontSize:10,fontWeight:600,letterSpacing:"0.14em",color:T.textMid,textTransform:"uppercase",marginBottom:7}}>Environmentals</div>
                        <div style={{color:T.textMid,fontSize:14,lineHeight:1.6}}>{s.environmentals}</div>
                      </div>
                    )}

                    {/* ── Ammunition Entries ── */}
                    <SecHdr accent={T.blue}>Ammunition Entries</SecHdr>
                    <div style={{padding:"0 22px",display:"flex",flexDirection:"column",gap:10}}>

                      {addingEntry&&!editingEntryId?(
                        <div style={{background:T.surface,border:`1px solid ${T.goldDim}`,borderRadius:14,padding:"14px"}}>
                          <div style={{fontFamily:T.mono,fontSize:10,color:T.gold,letterSpacing:"0.14em",marginBottom:12}}>NEW AMMUNITION ENTRY</div>
                          <EntryForm form={entryForm} setForm={setEntryForm} moaThreshold={r.moaThreshold}
                            onSave={()=>addEntry(r.id,s.id)} onCancel={()=>{setAddingEntry(false);setEntryForm(EMPTY_ENTRY);}}
                            saveLabel="LOG ENTRY" T={T}/>
                        </div>
                      ):(
                        !editingEntryId&&(
                          <button onClick={()=>{setAddingEntry(true);setEntryForm(EMPTY_ENTRY);}}
                            style={{width:"100%",padding:"15px",background:T.goldGlow,border:`1px solid ${T.goldDim}`,borderRadius:12,color:T.gold,fontSize:12,fontWeight:700,fontFamily:T.mono,letterSpacing:"0.12em",cursor:"pointer"}}>
                            + LOG AMMUNITION ENTRY
                          </button>
                        )
                      )}

                      {s.rangeEntries.length===0&&!addingEntry&&(
                        <div style={{textAlign:"center",padding:"20px",background:T.surface,border:`1px solid ${T.border}`,borderRadius:14}}>
                          <div style={{fontFamily:T.mono,fontSize:11,color:T.textDim,letterSpacing:"0.08em"}}>NO ENTRIES YET — LOG YOUR FIRST AMMUNITION</div>
                        </div>
                      )}

                      {[...s.rangeEntries].reverse().map(e=>{
                        const isEditingThis=editingEntryId===e.id;
                        const overMoa=r.moaThreshold&&e.moa!=null&&e.moa>r.moaThreshold;
                        const displayTitle = e.entryTitle || e.date;
                        return (
                          <div key={e.id}>
                            {isEditingThis?(
                              <div style={{background:T.surface,border:`1px solid ${T.goldDim}`,borderRadius:14,padding:"14px"}}>
                                <div style={{fontFamily:T.mono,fontSize:10,color:T.gold,letterSpacing:"0.14em",marginBottom:12}}>EDIT AMMUNITION ENTRY</div>
                                <EntryForm form={entryForm} setForm={setEntryForm} moaThreshold={r.moaThreshold}
                                  onSave={()=>saveEntryEdit(r.id,s.id)} onCancel={()=>{setEditingEntryId(null);setEntryForm(EMPTY_ENTRY);}}
                                  saveLabel="SAVE CHANGES" T={T}/>
                              </div>
                            ):(
                              <div style={{background:T.surface,border:`1px solid ${overMoa?"rgba(239,68,68,0.3)":T.border}`,borderRadius:14,padding:"14px 16px"}}>
                                {/* Header row */}
                                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                                  <div>
                                    <span style={{fontFamily:T.display,fontSize:15,color:T.text,letterSpacing:"0.06em"}}>{displayTitle.toUpperCase()}</span>
                                    {e.entryTitle&&<div style={{fontFamily:T.mono,fontSize:9,color:T.textDim,marginTop:1}}>{e.date}</div>}
                                  </div>
                                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                                    {e.moa!=null&&<MoaBadge moa={e.moa} threshold={r.moaThreshold}/>}
                                    <span style={{fontFamily:T.display,fontSize:20,color:T.gold,letterSpacing:"0.06em"}}>+{e.count}</span>
                                  </div>
                                </div>
                                {/* Ammo summary card */}
                                <div style={{background:T.card,borderRadius:10,padding:"10px 12px",marginBottom:10}}>
                                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                                    <span style={{fontFamily:T.mono,fontSize:9,color:T.blue,letterSpacing:"0.12em",fontWeight:700}}>🔫 {e.isCustom?`HANDLOAD · ${(e.cartridgeType||"rifle").toUpperCase()}`:"FACTORY"}</span>
                                  </div>
                                  <div style={{fontFamily:T.display,fontSize:16,color:T.text,letterSpacing:"0.05em"}}>{entryAmmoName(e).toUpperCase()}</div>
                                  {e.bulletWeight&&<div style={{fontFamily:T.mono,fontSize:10,color:T.textMid,marginTop:2}}>{e.bulletWeight}{e.bulletType?` · ${e.bulletType}`:""}{e.bulletMfg?` · ${e.bulletMfg}`:""}</div>}
                                  {e.powderCharge&&<div style={{fontFamily:T.mono,fontSize:10,color:T.amber,marginTop:1}}>{e.powderCharge}{e.powderMfg?` ${e.powderMfg}`:""}{e.primerType?` · ${e.primerType}`:""}</div>}
                                  {!e.bulletWeight&&!e.powderCharge&&<div style={{fontFamily:T.mono,fontSize:10,color:T.textDim,marginTop:2}}>No additional details logged</div>}
                                </div>
                                {/* Edit / Delete */}
                                <div style={{display:"flex",gap:7}}>
                                  <button onClick={()=>startEditEntry(e)} style={{flex:1,padding:"9px",background:T.goldGlow,border:`1px solid ${T.goldDim}`,borderRadius:8,color:T.gold,fontSize:11,fontFamily:T.mono,letterSpacing:"0.1em",cursor:"pointer"}}>EDIT</button>
                                  <button onClick={()=>deleteEntry(r.id,s.id,e.id)} style={{padding:"9px 13px",background:T.redDim,border:`1px solid rgba(239,68,68,0.25)`,borderRadius:8,color:T.red,fontSize:11,fontFamily:T.mono,cursor:"pointer"}}>DELETE</button>
                                </div>
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })()}

            </div>{/* end scroll */}

            {/* Home bar */}
            <div style={{position:"relative",zIndex:1,height:34,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <div style={{width:100,height:4,background:T.homeBar,borderRadius:2}}/>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
  <script>
    if('serviceWorker' in navigator){
      window.addEventListener('load',()=>{
        navigator.serviceWorker.register('sw.js')
          .then(r=>console.log('SW:',r.scope))
          .catch(e=>console.log('SW fail:',e));
      });
    }
  </script>
</body>
</html>
