<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Ballistic Log" />
  <title>Ballistic Log</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0c0c0d" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { background: #060607; overflow-x: hidden; }
    ::-webkit-scrollbar { display: none; }
    * { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    /* ─── Fonts ─── */
    const _fl = document.createElement("link");
    _fl.rel = "stylesheet";
    _fl.href = "https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap";
    document.head.appendChild(_fl);

    const BULLET_TYPES = ["FMJ","HP","BTHP","HPBT","SP","SST","ELD-M","ELD-X","Berger","Scenar","SMK","Wadcutter","Semi-WC","Tracer","Frangible","Other"];
    const PRIMER_TYPES = ["Small Rifle","Large Rifle","Small Rifle Mag","Large Rifle Mag","Small Pistol","Large Pistol","Federal 210M","CCI BR2","CCI 450","Rem 9½M","Other"];
    const BEST_METRICS = [
      { key:"avgMoa",  label:"Avg MOA",    desc:"Lowest average group size across all logged groups" },
      { key:"bestMoa", label:"Best Group", desc:"Smallest single group ever recorded"                },
      { key:"stdDev",  label:"Consistent", desc:"Most consistent — lowest group-to-group variance"   },
    ];

    /* ─── Design tokens ─── */
    const T = {
      bg:"#0c0c0d", surface:"#131315", card:"#18181b", border:"#27272a",
      gold:"#c9a96e", goldDim:"#7a5c30", goldGlow:"rgba(201,169,110,0.12)",
      amber:"#f59e0b", amberDim:"rgba(245,158,11,0.12)",
      red:"#ef4444",  redDim:"rgba(239,68,68,0.12)",
      blue:"#60a5fa", blueDim:"rgba(96,165,250,0.1)",
      green:"#4ade80", greenDim:"rgba(74,222,128,0.1)",
      purple:"#a78bfa", purpleDim:"rgba(167,139,250,0.12)",
      text:"#e4e4e7", textMid:"#71717a", textDim:"#3f3f46",
      mono:"'JetBrains Mono',monospace",
      display:"'Bebas Neue',sans-serif",
      body:"'DM Sans',sans-serif",
    };
    const noise = `url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E")`;

    /* ─── Primitive UI components ─── */
    const Label = ({ children }) => (
      <div style={{fontFamily:T.mono,fontSize:10,fontWeight:600,letterSpacing:"0.14em",color:T.textMid,textTransform:"uppercase",marginBottom:7}}>{children}</div>
    );
    const Input = ({ style, ...p }) => (
      <input {...p}
        style={{width:"100%",background:T.card,border:`1px solid ${T.border}`,borderRadius:10,padding:"12px 14px",color:T.text,fontSize:14,fontFamily:T.body,outline:"none",boxSizing:"border-box",transition:"border-color 0.15s",...style}}
        onFocus={e=>e.target.style.borderColor=T.goldDim}
        onBlur={e=>e.target.style.borderColor=T.border}
      />
    );
    const Textarea = ({ style, ...p }) => (
      <textarea {...p}
        style={{width:"100%",background:T.card,border:`1px solid ${T.border}`,borderRadius:10,padding:"12px 14px",color:T.text,fontSize:14,fontFamily:T.body,outline:"none",resize:"none",boxSizing:"border-box",transition:"border-color 0.15s",...style}}
        onFocus={e=>e.target.style.borderColor=T.goldDim}
        onBlur={e=>e.target.style.borderColor=T.border}
      />
    );
    const Chip = ({ label, active, onClick, accent }) => {
      const c = accent || T.gold;
      const rgb = accent===T.purple?"167,139,250":accent===T.amber?"245,158,11":"201,169,110";
      return (
        <button onClick={onClick} style={{padding:"6px 11px",borderRadius:7,cursor:"pointer",fontFamily:T.mono,fontSize:10,fontWeight:600,letterSpacing:"0.05em",border:active?`1px solid ${c}`:`1px solid ${T.border}`,background:active?`rgba(${rgb},0.12)`:"transparent",color:active?c:T.textMid,transition:"all 0.12s"}}>
          {label}
        </button>
      );
    };
    const Divider = () => <div style={{height:1,background:`linear-gradient(90deg,transparent,${T.border} 20%,${T.border} 80%,transparent)`,margin:"2px 0"}}/>;
    const DetailRow = ({ label, value, accent }) => (
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"11px 16px"}}>
        <span style={{fontFamily:T.mono,fontSize:10,color:T.textMid,letterSpacing:"0.08em",textTransform:"uppercase",flexShrink:0,marginRight:8}}>{label}</span>
        <span style={{fontFamily:T.mono,fontSize:12,fontWeight:700,color:accent||T.text,letterSpacing:"0.04em",textAlign:"right",wordBreak:"break-word"}}>{value}</span>
      </div>
    );
    const Crosshair = ({ size=120, opacity=0.04 }) => (
      <svg width={size} height={size} viewBox="0 0 120 120" fill="none" style={{position:"absolute",opacity}}>
        <circle cx="60" cy="60" r="58" stroke="#c9a96e" strokeWidth="1"/>
        <circle cx="60" cy="60" r="30" stroke="#c9a96e" strokeWidth="0.6"/>
        <circle cx="60" cy="60" r="4"  stroke="#c9a96e" strokeWidth="1"/>
        <line x1="0"  y1="60" x2="46"  y2="60" stroke="#c9a96e" strokeWidth="0.8"/>
        <line x1="74" y1="60" x2="120" y2="60" stroke="#c9a96e" strokeWidth="0.8"/>
        <line x1="60" y1="0"  x2="60"  y2="46" stroke="#c9a96e" strokeWidth="0.8"/>
        <line x1="60" y1="74" x2="60"  y2="120" stroke="#c9a96e" strokeWidth="0.8"/>
      </svg>
    );
    const SectionHeader = ({ children, accent }) => (
      <div style={{display:"flex",alignItems:"center",gap:10,margin:"20px 22px 10px"}}>
        <div style={{width:2,height:14,background:`linear-gradient(180deg,${accent||T.gold},transparent)`}}/>
        <span style={{fontFamily:T.mono,fontSize:10,fontWeight:600,letterSpacing:"0.18em",color:accent||T.goldDim,textTransform:"uppercase"}}>{children}</span>
      </div>
    );
    const Toggle = ({ label, value, onChange }) => (
      <div onClick={()=>onChange(!value)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px",background:T.card,border:`1px solid ${value?T.goldDim:T.border}`,borderRadius:10,cursor:"pointer",userSelect:"none"}}>
        <span style={{fontFamily:T.mono,fontSize:11,color:value?T.gold:T.textMid,letterSpacing:"0.08em"}}>{label}</span>
        <div style={{width:40,height:22,background:value?"#7a5c30":"#2a2a2e",borderRadius:11,position:"relative",transition:"background 0.2s",flexShrink:0}}>
          <div style={{position:"absolute",top:3,left:value?20:3,width:16,height:16,background:value?T.gold:"#52525b",borderRadius:"50%",transition:"left 0.2s"}}/>
        </div>
      </div>
    );
    const MoaBadge = ({ moa, threshold }) => {
      if (moa == null) return null;
      const over = threshold && moa > threshold;
      return (
        <div style={{display:"inline-flex",alignItems:"center",gap:4,background:over?T.redDim:T.greenDim,border:`1px solid ${over?"rgba(239,68,68,0.35)":"rgba(74,222,128,0.3)"}`,borderRadius:6,padding:"3px 8px"}}>
          <span style={{fontFamily:T.mono,fontSize:11,fontWeight:700,color:over?T.red:T.green,letterSpacing:"0.06em"}}>{moa} MOA</span>
          {over&&<span style={{fontSize:9}}>⚠</span>}
        </div>
      );
    };
    const MoaSparkline = ({ entries, threshold, width=280, height=52 }) => {
      const moas = entries.map(e=>e.moa).filter(m=>m!=null);
      if (moas.length < 2) return null;
      const mn=Math.min(...moas,0), mx=Math.max(...moas,threshold||0)*1.15, rng=mx-mn||1;
      const pts = moas.map((m,i)=>`${(i/(moas.length-1))*width},${height-((m-mn)/rng)*height}`).join(" ");
      const thY = threshold ? height-((threshold-mn)/rng)*height : null;
      return (
        <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{overflow:"visible"}}>
          {thY!=null&&<>
            <line x1="0" y1={thY} x2={width} y2={thY} stroke={T.red} strokeWidth="1" strokeDasharray="4,3" opacity="0.5"/>
            <text x={width-2} y={thY-4} fill={T.red} fontSize="8" fontFamily={T.mono} textAnchor="end" opacity="0.7">THRESHOLD</text>
          </>}
          <polyline points={pts} fill="none" stroke={T.gold} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round" opacity="0.8"/>
          {moas.map((m,i)=>{
            const x=(i/(moas.length-1))*width, y=height-((m-mn)/rng)*height;
            return <circle key={i} cx={x} cy={y} r="3" fill={threshold&&m>threshold?T.red:T.gold}/>;
          })}
        </svg>
      );
    };

    /* ─── Data helpers ─── */
    const r2 = v => Math.round(v*100)/100;
    const entryAmmoName = e => e.isCustom ? (e.customName||"Custom Load") : (e.brand||"Unnamed");

    // All range entries across a rifle that have MOA logged
    const allRifleEntries = rifle => rifle.sessions.flatMap(s => s.rangeEntries);
    const allRifleMoaEntries = rifle => allRifleEntries(rifle).filter(e=>e.moa!=null);

    // Per-entry metric helpers (entry = one ammo + rounds + moa)
    // For "best load" we group entries by ammo identity across all sessions of a rifle
    const ammoKey = e => entryAmmoName(e) + (e.bulletWeight||"") + (e.bulletType||"") + (e.powderCharge||"");
    const groupEntriesByAmmo = rifle => {
      const groups = {};
      allRifleEntries(rifle).forEach(e => {
        const k = ammoKey(e);
        if (!groups[k]) groups[k] = { entries:[], proto:e };
        groups[k].entries.push(e);
      });
      return Object.values(groups);
    };
    const groupAvgMoa  = g => { const v=g.entries.map(e=>e.moa).filter(m=>m!=null); return v.length?r2(v.reduce((a,b)=>a+b,0)/v.length):null; };
    const groupBestMoa = g => { const v=g.entries.map(e=>e.moa).filter(m=>m!=null); return v.length?r2(Math.min(...v)):null; };
    const groupStdDev  = g => {
      const v=g.entries.map(e=>e.moa).filter(m=>m!=null); if(v.length<2) return null;
      const avg=v.reduce((a,b)=>a+b,0)/v.length;
      return r2(Math.sqrt(v.reduce((a,b)=>a+(b-avg)**2,0)/v.length));
    };
    const groupMetricVal = (g, metric) =>
      metric==="avgMoa"?groupAvgMoa(g):metric==="bestMoa"?groupBestMoa(g):groupStdDev(g);
    const findBestAmmoGroup = (rifle, metric) => {
      const groups = groupEntriesByAmmo(rifle).filter(g=>groupMetricVal(g,metric)!=null);
      return groups.length ? groups.reduce((a,b)=>groupMetricVal(b,metric)<groupMetricVal(a,metric)?b:a) : null;
    };

    // Session-level stats (across all entries in a session regardless of ammo)
    const sessionMoas    = s => s.rangeEntries.map(e=>e.moa).filter(m=>m!=null);
    const sessionAvgMoa  = s => { const v=sessionMoas(s); return v.length?r2(v.reduce((a,b)=>a+b,0)/v.length):null; };
    const sessionBestMoa = s => { const v=sessionMoas(s); return v.length?r2(Math.min(...v)):null; };

    const latestRifleMoa = rifle => {
      const all = allRifleMoaEntries(rifle);
      return all.length ? all[all.length-1].moa : null;
    };
    const bestRifleMoa = rifle => {
      const all = allRifleMoaEntries(rifle);
      return all.length ? r2(Math.min(...all.map(e=>e.moa))) : null;
    };

    /* ─── Empty forms ─── */
    const EMPTY_RIFLE = { name:"", serial:"", caliber:"", cleanInterval:"", moaThreshold:"" };
    const EMPTY_SESSION = { conditions:"", environmentals:"" };
    const EMPTY_ENTRY = {
      isCustom:false, brand:"", customName:"",
      bulletType:"", bulletWeight:"", bulletMfg:"",
      powderCharge:"", powderMfg:"", primerType:"",
      shots:"", moa:"",
    };

    /* ─── RifleFormFields — outside App to prevent input focus loss ─── */
    const RifleFormFields = ({ form, setForm }) => (
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div><Label>Rifle Name *</Label>
          <Input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="e.g. Remington 700 LR"/>
        </div>
        <div><Label>Serial Number <span style={{fontWeight:400,color:T.textDim}}>(optional)</span></Label>
          <Input value={form.serial} onChange={e=>setForm({...form,serial:e.target.value})} placeholder="e.g. US12345678" style={{fontFamily:T.mono,letterSpacing:"0.06em"}}/>
        </div>
        <div><Label>Caliber <span style={{fontWeight:400,color:T.textDim}}>(optional)</span></Label>
          <Input value={form.caliber} onChange={e=>setForm({...form,caliber:e.target.value})} placeholder="e.g. .308 Win, 6.5 Creedmoor"/>
        </div>
        <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,overflow:"hidden"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",borderBottom:`1px solid ${T.border}`,background:T.amberDim}}>
            <span>🧹</span><span style={{fontFamily:T.mono,fontSize:10,color:T.amber,letterSpacing:"0.14em",textTransform:"uppercase",fontWeight:700}}>Barrel Clean Reminder</span>
          </div>
          <div style={{padding:"12px 14px 14px"}}>
            <Label>Warn after every X rounds <span style={{fontWeight:400,color:T.textDim}}>(optional)</span></Label>
            <Input value={form.cleanInterval} onChange={e=>setForm({...form,cleanInterval:e.target.value})} placeholder="e.g. 200" type="number" style={{fontFamily:T.mono}}/>
          </div>
        </div>
        <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,overflow:"hidden"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",borderBottom:`1px solid ${T.border}`,background:T.redDim}}>
            <span>🎯</span><span style={{fontFamily:T.mono,fontSize:10,color:T.red,letterSpacing:"0.14em",textTransform:"uppercase",fontWeight:700}}>Accuracy / Shot-Out Warning</span>
          </div>
          <div style={{padding:"12px 14px 14px"}}>
            <Label>Warn if group exceeds X MOA <span style={{fontWeight:400,color:T.textDim}}>(optional)</span></Label>
            <Input value={form.moaThreshold} onChange={e=>setForm({...form,moaThreshold:e.target.value})} placeholder="e.g. 1.5" type="number" step="0.1" style={{fontFamily:T.mono}}/>
            <div style={{fontFamily:T.mono,fontSize:10,color:T.textDim,marginTop:6,letterSpacing:"0.05em",lineHeight:1.5}}>Alerts when a logged group exceeds this value — may indicate barrel wear</div>
          </div>
        </div>
      </div>
    );

    /* ─── EntryForm — outside App to prevent input focus loss ─── */
    /* Used for both adding and editing a range entry */
    const EntryForm = ({ form, setForm, moaThreshold, onSave, onCancel, saveLabel="LOG ENTRY" }) => {
      const isCustom = form.isCustom;
      const canSave  = !!(form.shots && parseInt(form.shots) > 0 && (isCustom ? form.customName : form.brand));
      return (
        <div style={{display:"flex",flexDirection:"column",gap:12}}>

          {/* Rounds + MOA row */}
          <div style={{display:"flex",gap:8}}>
            <div style={{flex:1}}>
              <Label>Rounds Fired *</Label>
              <Input value={form.shots} onChange={e=>setForm({...form,shots:e.target.value})} placeholder="e.g. 20" type="number" style={{fontFamily:T.mono}}/>
            </div>
            <div style={{flex:1}}>
              <Label>Group Size <span style={{fontWeight:400,color:T.textDim}}>(MOA)</span></Label>
              <Input value={form.moa} onChange={e=>setForm({...form,moa:e.target.value})} placeholder="e.g. 0.8" type="number" step="0.01" style={{fontFamily:T.mono}}/>
            </div>
          </div>

          {/* MOA threshold warning */}
          {moaThreshold && form.moa && parseFloat(form.moa) > moaThreshold && (
            <div style={{background:T.redDim,border:"1px solid rgba(239,68,68,0.3)",borderRadius:8,padding:"8px 12px"}}>
              <span style={{fontFamily:T.mono,fontSize:10,color:T.red}}>⚠ {form.moa} MOA EXCEEDS {moaThreshold} MOA THRESHOLD</span>
            </div>
          )}

          {/* Ammo section */}
          <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,overflow:"hidden"}}>
            <div style={{padding:"10px 14px",borderBottom:`1px solid ${T.border}`,background:T.blueDim}}>
              <span style={{fontFamily:T.mono,fontSize:10,color:T.blue,letterSpacing:"0.14em",fontWeight:700}}>🔫 AMMUNITION</span>
            </div>
            <div style={{padding:"12px",display:"flex",flexDirection:"column",gap:10}}>
              <Toggle label="CUSTOM / HANDLOAD" value={isCustom} onChange={v=>setForm({...form,isCustom:v,brand:"",customName:""})}/>

              {/* Factory */}
              {!isCustom && <>
                <div>
                  <Label>Manufacturer *</Label>
                  <Input value={form.brand} onChange={e=>setForm({...form,brand:e.target.value})} placeholder="e.g. Federal, Lapua, Hornady"/>
                </div>
                <div>
                  <Label>Projectile Type <span style={{fontWeight:400,color:T.textDim}}>(optional)</span></Label>
                  <div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:2}}>
                    {BULLET_TYPES.map(t=><Chip key={t} label={t} active={form.bulletType===t} onClick={()=>setForm({...form,bulletType:form.bulletType===t?"":t})}/>)}
                  </div>
                </div>
                <div>
                  <Label>Factory Spec / Lot <span style={{fontWeight:400,color:T.textDim}}>(optional)</span></Label>
                  <Input value={form.bulletWeight} onChange={e=>setForm({...form,bulletWeight:e.target.value})} placeholder="e.g. 168gr Gold Medal Match · Lot #A4421"/>
                </div>
              </>}

              {/* Custom / Handload */}
              {isCustom && <>
                <div>
                  <Label>Load Name *</Label>
                  <Input value={form.customName} onChange={e=>setForm({...form,customName:e.target.value})} placeholder="e.g. 175gr SMK Precision Load"/>
                </div>
                {/* Bullet */}
                <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:10,padding:"10px 12px 12px"}}>
                  <div style={{fontFamily:T.mono,fontSize:9,color:T.goldDim,letterSpacing:"0.14em",marginBottom:8}}>BULLET</div>
                  <div style={{display:"flex",gap:8,marginBottom:8}}>
                    <div style={{flex:1}}><Label>Weight</Label><Input value={form.bulletWeight} onChange={e=>setForm({...form,bulletWeight:e.target.value})} placeholder="e.g. 175gr"/></div>
                    <div style={{flex:1}}><Label>Manufacturer</Label><Input value={form.bulletMfg} onChange={e=>setForm({...form,bulletMfg:e.target.value})} placeholder="e.g. Sierra"/></div>
                  </div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                    {BULLET_TYPES.map(t=><Chip key={t} label={t} active={form.bulletType===t} onClick={()=>setForm({...form,bulletType:form.bulletType===t?"":t})}/>)}
                  </div>
                </div>
                {/* Powder */}
                <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:10,padding:"10px 12px 12px"}}>
                  <div style={{fontFamily:T.mono,fontSize:9,color:T.amber,letterSpacing:"0.14em",marginBottom:8}}>POWDER</div>
                  <div style={{display:"flex",gap:8}}>
                    <div style={{flex:1}}><Label>Charge Weight</Label><Input value={form.powderCharge} onChange={e=>setForm({...form,powderCharge:e.target.value})} placeholder="e.g. 43.5gr"/></div>
                    <div style={{flex:1}}><Label>Powder Name</Label><Input value={form.powderMfg} onChange={e=>setForm({...form,powderMfg:e.target.value})} placeholder="e.g. Varget"/></div>
                  </div>
                </div>
                {/* Primer */}
                <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:10,padding:"10px 12px 12px"}}>
                  <div style={{fontFamily:T.mono,fontSize:9,color:T.purple,letterSpacing:"0.14em",marginBottom:8}}>PRIMER</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                    {PRIMER_TYPES.map(t=><Chip key={t} label={t} accent={T.purple} active={form.primerType===t} onClick={()=>setForm({...form,primerType:form.primerType===t?"":t})}/>)}
                  </div>
                </div>
              </>}
            </div>
          </div>

          {/* Action buttons */}
          <div style={{display:"flex",gap:8}}>
            <button onClick={onSave} disabled={!canSave}
              style={{flex:1,background:canSave?T.gold:T.card,border:"none",borderRadius:9,color:canSave?"#0c0c0d":T.textDim,fontSize:12,fontWeight:700,fontFamily:T.mono,letterSpacing:"0.1em",padding:"13px",cursor:canSave?"pointer":"not-allowed"}}>
              {saveLabel}
            </button>
            <button onClick={onCancel}
              style={{background:"transparent",border:`1px solid ${T.border}`,borderRadius:9,color:T.textMid,fontSize:14,padding:"13px 15px",cursor:"pointer"}}>✕</button>
          </div>
        </div>
      );
    };

    /* ════════════════════════════════════════
       MAIN APP
    ════════════════════════════════════════ */
    function App() {
      const [rifles, setRifles]             = useState([]);
      const [view, setView]                 = useState("rifles");
      const [selRifleId, setSelRifleId]     = useState(null);
      const [selSessionId, setSelSessionId] = useState(null);
      const [rifleForm, setRifleForm]       = useState(EMPTY_RIFLE);
      const [sessionForm, setSessionForm]   = useState(EMPTY_SESSION);
      const [editingRifle, setEditingRifle] = useState(false);
      const [entryForm, setEntryForm]       = useState(EMPTY_ENTRY);
      const [addingEntry, setAddingEntry]   = useState(false);
      const [editingEntryId, setEditingEntryId] = useState(null); // id of entry being edited
      const [cleanDismissed, setCleanDismissed] = useState({});
      const [moaDismissed, setMoaDismissed]     = useState({});
      const [bestMetric, setBestMetric]         = useState({});

      const selRifle   = rifles.find(r=>r.id===selRifleId);
      const selSession = selRifle?.sessions.find(s=>s.id===selSessionId);
      const getRifleMetric = r => bestMetric[r.id] || "avgMoa";

      /* ── computed ── */
      const totalRounds  = r => r.sessions.reduce((a,s)=>a+s.rangeEntries.reduce((b,e)=>b+e.count,0),0);
      const needsClean   = r => r.cleanInterval && r.roundsSinceClean>=r.cleanInterval && !cleanDismissed[r.id];
      const cleanPct     = r => !r.cleanInterval?0:Math.min((r.roundsSinceClean/r.cleanInterval)*100,100);
      const needsMoaWarn = r => {
        if (!r.moaThreshold||moaDismissed[r.id]) return false;
        const last=latestRifleMoa(r); return last!=null&&last>r.moaThreshold;
      };

      /* ── rifle actions ── */
      const createRifle = () => {
        if (!rifleForm.name) return;
        setRifles(prev=>[{
          id:Date.now(), name:rifleForm.name, serial:rifleForm.serial, caliber:rifleForm.caliber,
          cleanInterval:parseInt(rifleForm.cleanInterval)||null,
          moaThreshold:parseFloat(rifleForm.moaThreshold)||null,
          roundsSinceClean:0,
          created:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}),
          cleanHistory:[], sessions:[],
        },...prev]);
        setRifleForm(EMPTY_RIFLE); setView("rifles");
      };
      const saveRifleEdit = () => {
        setRifles(prev=>prev.map(r=>r.id!==selRifleId?r:{
          ...r, name:rifleForm.name, serial:rifleForm.serial, caliber:rifleForm.caliber,
          cleanInterval:parseInt(rifleForm.cleanInterval)||null,
          moaThreshold:parseFloat(rifleForm.moaThreshold)||null,
        }));
        setEditingRifle(false);
      };
      const deleteRifle = id => { setRifles(prev=>prev.filter(r=>r.id!==id)); setView("rifles"); };
      const markCleaned = rifleId => {
        setRifles(prev=>prev.map(r=>r.id!==rifleId?r:{
          ...r, roundsSinceClean:0,
          cleanHistory:[...r.cleanHistory,{
            date:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}),
            atRound:totalRounds(r),
          }],
        }));
        setCleanDismissed(prev=>({...prev,[rifleId]:true}));
      };

      /* ── session actions ── */
      const createSession = () => {
        const now = new Date();
        const datePart = now.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
        const r = rifles.find(r=>r.id===selRifleId);
        const autoName = `${r.name} · ${now.toLocaleDateString("en-US",{month:"short",day:"numeric"})}`;
        setRifles(prev=>prev.map(r=>r.id!==selRifleId?r:{
          ...r,
          sessions:[{
            id:Date.now(), name:autoName,
            conditions:sessionForm.conditions,
            environmentals:sessionForm.environmentals,
            created:datePart,
            rangeEntries:[],
          },...r.sessions],
        }));
        setSessionForm(EMPTY_SESSION); setView("rifleDetail");
      };
      const deleteSession = sid => {
        // subtract those rounds from roundsSinceClean
        const s = selRifle.sessions.find(s=>s.id===sid);
        const rds = s ? s.rangeEntries.reduce((a,e)=>a+e.count,0) : 0;
        setRifles(prev=>prev.map(r=>r.id!==selRifleId?r:{
          ...r,
          roundsSinceClean:Math.max(0,r.roundsSinceClean-rds),
          sessions:r.sessions.filter(s=>s.id!==sid),
        }));
        setView("rifleDetail");
      };

      /* ── range entry actions ── */
      const buildEntry = (form, existingRunningTotal) => ({
        id: Date.now(),
        date: new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"}),
        count: parseInt(form.shots),
        moa: form.moa!==""?parseFloat(form.moa):null,
        isCustom:   form.isCustom,
        brand:      form.brand,
        customName: form.customName,
        bulletType: form.bulletType,
        bulletWeight:form.bulletWeight,
        bulletMfg:  form.bulletMfg,
        powderCharge:form.powderCharge,
        powderMfg:  form.powderMfg,
        primerType: form.primerType,
      });

      const addEntry = (rifleId, sessionId) => {
        const n = parseInt(entryForm.shots);
        if (!n||n<=0) return;
        const newEntry = buildEntry(entryForm);
        setRifles(prev=>prev.map(r=>{
          if (r.id!==rifleId) return r;
          return {
            ...r, roundsSinceClean:r.roundsSinceClean+n,
            sessions:r.sessions.map(s=>{
              if (s.id!==sessionId) return s;
              return {...s, rangeEntries:[...s.rangeEntries, newEntry]};
            }),
          };
        }));
        setCleanDismissed(prev=>({...prev,[rifleId]:false}));
        setMoaDismissed(prev=>({...prev,[rifleId]:false}));
        setEntryForm(EMPTY_ENTRY); setAddingEntry(false);
      };

      const saveEntryEdit = (rifleId, sessionId) => {
        const oldEntry = selSession.rangeEntries.find(e=>e.id===editingEntryId);
        const oldCount = oldEntry ? oldEntry.count : 0;
        const newCount = parseInt(entryForm.shots)||0;
        const diff = newCount - oldCount;
        setRifles(prev=>prev.map(r=>{
          if (r.id!==rifleId) return r;
          return {
            ...r, roundsSinceClean:Math.max(0,r.roundsSinceClean+diff),
            sessions:r.sessions.map(s=>{
              if (s.id!==sessionId) return s;
              return {
                ...s,
                rangeEntries:s.rangeEntries.map(e=>e.id!==editingEntryId?e:{
                  ...e,
                  count:newCount,
                  moa:entryForm.moa!==""?parseFloat(entryForm.moa):null,
                  isCustom:entryForm.isCustom, brand:entryForm.brand,
                  customName:entryForm.customName, bulletType:entryForm.bulletType,
                  bulletWeight:entryForm.bulletWeight, bulletMfg:entryForm.bulletMfg,
                  powderCharge:entryForm.powderCharge, powderMfg:entryForm.powderMfg,
                  primerType:entryForm.primerType,
                }),
              };
            }),
          };
        }));
        setMoaDismissed(prev=>({...prev,[rifleId]:false}));
        setEditingEntryId(null); setEntryForm(EMPTY_ENTRY);
      };

      const deleteEntry = (rifleId, sessionId, entryId) => {
        const entry = selSession.rangeEntries.find(e=>e.id===entryId);
        const n = entry ? entry.count : 0;
        setRifles(prev=>prev.map(r=>{
          if (r.id!==rifleId) return r;
          return {
            ...r, roundsSinceClean:Math.max(0,r.roundsSinceClean-n),
            sessions:r.sessions.map(s=>{
              if (s.id!==sessionId) return s;
              return {...s, rangeEntries:s.rangeEntries.filter(e=>e.id!==entryId)};
            }),
          };
        }));
      };

      const startEditEntry = (entry) => {
        setEditingEntryId(entry.id);
        setAddingEntry(false);
        setEntryForm({
          isCustom:   entry.isCustom||false,
          brand:      entry.brand||"",
          customName: entry.customName||"",
          bulletType: entry.bulletType||"",
          bulletWeight:entry.bulletWeight||"",
          bulletMfg:  entry.bulletMfg||"",
          powderCharge:entry.powderCharge||"",
          powderMfg:  entry.powderMfg||"",
          primerType: entry.primerType||"",
          shots:      String(entry.count||""),
          moa:        entry.moa!=null?String(entry.moa):"",
        });
      };

      /* ── nav ── */
      const goRifles        = ()  => { setView("rifles"); setSelRifleId(null); setSelSessionId(null); setEditingRifle(false); };
      const goRifleDetail   = id  => { setSelRifleId(id); setSelSessionId(null); setView("rifleDetail"); setAddingEntry(false); setEditingRifle(false); setEditingEntryId(null); };
      const goSessionDetail = sid => { setSelSessionId(sid); setView("sessionDetail"); setAddingEntry(false); setEditingEntryId(null); setEntryForm(EMPTY_ENTRY); };
      const goNewRifle      = ()  => { setRifleForm(EMPTY_RIFLE); setView("newRifle"); };
      const goNewSession    = ()  => { setSessionForm(EMPTY_SESSION); setView("newSession"); };
      const startEditRifle  = r  => {
        setRifleForm({name:r.name,serial:r.serial||"",caliber:r.caliber||"",cleanInterval:r.cleanInterval||"",moaThreshold:r.moaThreshold||""});
        setEditingRifle(true);
      };

      /* shared BackBtn — stable because it never closes over mutable state */
      const BackBtn = ({ label, to }) => (
        <button onClick={to} style={{background:"transparent",border:`1px solid ${T.border}`,borderRadius:8,color:T.gold,fontSize:11,fontWeight:700,fontFamily:T.mono,letterSpacing:"0.1em",padding:"7px 14px",cursor:"pointer"}}>{label}</button>
      );

      /* ════════════════ RENDER ════════════════ */
      return (
        <div style={{display:"flex",justifyContent:"center",alignItems:"center",minHeight:"100vh",background:"#060607",fontFamily:T.body}}>
          <div style={{width:390,minHeight:844,background:T.bg,borderRadius:52,border:"9px solid #1c1c1f",boxShadow:"0 0 0 1.5px #2a2a2e,0 60px 120px rgba(0,0,0,0.9),inset 0 1px 0 rgba(255,255,255,0.04)",overflow:"hidden",display:"flex",flexDirection:"column",position:"relative"}}>

            <div style={{position:"absolute",inset:0,backgroundImage:noise,backgroundSize:"256px 256px",pointerEvents:"none",zIndex:0}}/>

            {/* Status bar */}
            <div style={{position:"relative",zIndex:1,display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 28px 0",color:T.textMid,fontSize:11,fontFamily:T.mono,fontWeight:600,letterSpacing:"0.06em"}}>
              <span>09:41</span>
              <div style={{width:110,height:28,background:T.bg,borderRadius:20,position:"absolute",left:"50%",transform:"translateX(-50%)",top:0}}/>
              <span>▋▋▋▋ ⌁</span>
            </div>

            {/* Scroll area */}
            <div style={{position:"relative",zIndex:1,flex:1,overflowY:"auto",paddingBottom:36}}>

              {/* ══════════════ RIFLES LIST ══════════════ */}
              {view==="rifles"&&(
                <div>
                  <div style={{padding:"28px 22px 18px"}}>
                    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
                      <div style={{width:2,height:20,background:`linear-gradient(180deg,${T.gold},transparent)`}}/>
                      <span style={{fontFamily:T.mono,fontSize:10,letterSpacing:"0.2em",color:T.goldDim,textTransform:"uppercase"}}>Ballistic Log · v4</span>
                    </div>
                    <div style={{fontFamily:T.display,fontSize:46,color:T.text,lineHeight:1,letterSpacing:"0.04em"}}>RIFLES</div>
                    <div style={{fontFamily:T.mono,fontSize:11,color:T.textMid,marginTop:6,letterSpacing:"0.08em"}}>
                      {rifles.length} RIFLE{rifles.length!==1?"S":""} · {rifles.reduce((a,r)=>a+totalRounds(r),0).toLocaleString()} TOTAL RDS
                    </div>
                  </div>

                  {/* Global alerts */}
                  {rifles.filter(r=>needsClean(r)||needsMoaWarn(r)).map(r=>(
                    <div key={r.id}>
                      {needsClean(r)&&(
                        <div onClick={()=>goRifleDetail(r.id)} style={{margin:"0 22px 8px",background:T.amberDim,border:"1px solid rgba(245,158,11,0.3)",borderRadius:12,padding:"12px 16px",display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}>
                          <span style={{fontSize:16}}>🧹</span>
                          <div style={{flex:1}}>
                            <div style={{fontFamily:T.mono,fontSize:11,fontWeight:700,color:T.amber,letterSpacing:"0.08em"}}>CLEAN BARREL — {r.name.toUpperCase()}</div>
                            <div style={{fontFamily:T.mono,fontSize:10,color:"#92681a",marginTop:2}}>{r.roundsSinceClean} RDS SINCE LAST CLEAN</div>
                          </div>
                          <span style={{color:T.amber}}>›</span>
                        </div>
                      )}
                      {needsMoaWarn(r)&&(
                        <div onClick={()=>goRifleDetail(r.id)} style={{margin:"0 22px 8px",background:T.redDim,border:"1px solid rgba(239,68,68,0.3)",borderRadius:12,padding:"12px 16px",display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}>
                          <span style={{fontSize:16}}>🎯</span>
                          <div style={{flex:1}}>
                            <div style={{fontFamily:T.mono,fontSize:11,fontWeight:700,color:T.red,letterSpacing:"0.08em"}}>ACCURACY ALERT — {r.name.toUpperCase()}</div>
                            <div style={{fontFamily:T.mono,fontSize:10,color:"#993333",marginTop:2}}>LAST GROUP {latestRifleMoa(r)} MOA · THRESHOLD {r.moaThreshold} MOA</div>
                          </div>
                          <span style={{color:T.red}}>›</span>
                        </div>
                      )}
                    </div>
                  ))}

                  {/* Rifle cards */}
                  <div style={{padding:"0 22px",display:"flex",flexDirection:"column",gap:10}}>
                    {rifles.length===0&&(
                      <div style={{textAlign:"center",padding:"60px 20px 30px",position:"relative"}}>
                        <div style={{display:"flex",justifyContent:"center",marginBottom:20}}><Crosshair size={100} opacity={0.12}/></div>
                        <div style={{fontFamily:T.display,fontSize:26,color:T.textDim,letterSpacing:"0.1em"}}>NO RIFLES YET</div>
                        <div style={{fontFamily:T.mono,fontSize:11,color:T.textDim,marginTop:8,letterSpacing:"0.08em"}}>ADD YOUR FIRST RIFLE TO BEGIN</div>
                      </div>
                    )}
                    {rifles.map(r=>{
                      const dirty=needsClean(r), moaWarn=needsMoaWarn(r);
                      const total=totalRounds(r), pct=cleanPct(r), lMoa=latestRifleMoa(r);
                      const metric=getRifleMetric(r), bg=findBestAmmoGroup(r,metric);
                      const ac=moaWarn?T.red:dirty?T.amber:T.gold;
                      return (
                        <div key={r.id} onClick={()=>goRifleDetail(r.id)} style={{background:T.surface,border:`1px solid ${moaWarn?"rgba(239,68,68,0.4)":dirty?"rgba(245,158,11,0.35)":T.border}`,borderRadius:14,padding:"16px 18px",cursor:"pointer",position:"relative",overflow:"hidden"}}>
                          <div style={{position:"absolute",top:0,left:0,width:3,height:"100%",background:`linear-gradient(180deg,${ac},transparent)`,borderRadius:"14px 0 0 14px"}}/>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginLeft:8}}>
                            <div style={{flex:1}}>
                              <div style={{fontFamily:T.display,fontSize:22,color:T.text,letterSpacing:"0.06em",lineHeight:1.1}}>{r.name.toUpperCase()}</div>
                              {r.serial&&<div style={{fontFamily:T.mono,fontSize:10,color:T.goldDim,marginTop:3,letterSpacing:"0.12em"}}>S/N {r.serial}</div>}
                              {r.caliber&&<div style={{fontFamily:T.mono,fontSize:11,color:T.textMid,marginTop:2}}>{r.caliber}</div>}
                              {lMoa!=null&&<div style={{marginTop:6}}><MoaBadge moa={lMoa} threshold={r.moaThreshold}/></div>}
                            </div>
                            <div style={{textAlign:"right"}}>
                              <div style={{fontFamily:T.display,fontSize:34,color:T.gold,letterSpacing:"0.04em",lineHeight:1}}>{total.toLocaleString()}</div>
                              <div style={{fontFamily:T.mono,fontSize:9,color:T.textDim,letterSpacing:"0.12em",marginTop:2}}>TOTAL RDS</div>
                            </div>
                          </div>
                          {bg&&(
                            <div style={{marginLeft:8,marginTop:8,display:"flex",alignItems:"center",gap:6}}>
                              <span style={{fontSize:11}}>🏆</span>
                              <span style={{fontFamily:T.mono,fontSize:9,color:T.green,letterSpacing:"0.08em"}}>
                                BEST: {entryAmmoName(bg.proto)}{groupMetricVal(bg,metric)!=null?` · ${groupMetricVal(bg,metric)} MOA`:""}
                              </span>
                            </div>
                          )}
                          {r.cleanInterval&&(
                            <div style={{marginLeft:8,marginTop:8}}>
                              <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                                <span style={{fontFamily:T.mono,fontSize:9,color:dirty?T.amber:T.textDim,letterSpacing:"0.1em"}}>{dirty?"⚠ CLEAN NEEDED":`${r.roundsSinceClean}/${r.cleanInterval} SINCE CLEAN`}</span>
                                <span style={{fontFamily:T.mono,fontSize:9,color:T.textDim}}>{Math.round(pct)}%</span>
                              </div>
                              <div style={{height:3,background:T.card,borderRadius:2,overflow:"hidden"}}>
                                <div style={{height:"100%",width:`${pct}%`,background:pct>=100?T.amber:pct>75?"#f97316":T.gold,borderRadius:2}}/>
                              </div>
                            </div>
                          )}
                          <div style={{display:"flex",justifyContent:"space-between",marginTop:10,marginLeft:8,paddingTop:8,borderTop:`1px solid ${T.border}`}}>
                            <span style={{fontFamily:T.mono,fontSize:9,color:T.textDim}}>ADDED {r.created.toUpperCase()}</span>
                            <span style={{fontFamily:T.mono,fontSize:9,color:T.textDim}}>{r.sessions.length} SESSION{r.sessions.length!==1?"S":""} ›</span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                  <div style={{padding:"20px 22px 0"}}>
                    <button onClick={goNewRifle} style={{width:"100%",padding:"17px",background:`linear-gradient(135deg,${T.gold},#9d6f2a)`,border:"none",borderRadius:12,color:"#0c0c0d",fontSize:13,fontWeight:700,fontFamily:T.mono,letterSpacing:"0.15em",cursor:"pointer"}}>+ ADD RIFLE</button>
                  </div>
                </div>
              )}

              {/* ══════════════ NEW RIFLE ══════════════ */}
              {view==="newRifle"&&(
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:14,padding:"28px 22px 22px"}}>
                    <BackBtn label="← RIFLES" to={goRifles}/>
                    <div style={{fontFamily:T.display,fontSize:28,color:T.text,letterSpacing:"0.06em"}}>NEW RIFLE</div>
                  </div>
                  <div style={{padding:"0 22px 20px"}}>
                    <RifleFormFields form={rifleForm} setForm={setRifleForm}/>
                    <button onClick={createRifle} disabled={!rifleForm.name}
                      style={{width:"100%",padding:"17px",marginTop:16,background:!rifleForm.name?T.card:`linear-gradient(135deg,${T.gold},#9d6f2a)`,border:`1px solid ${!rifleForm.name?T.border:"transparent"}`,borderRadius:12,color:!rifleForm.name?T.textDim:"#0c0c0d",fontSize:13,fontWeight:700,fontFamily:T.mono,letterSpacing:"0.15em",cursor:!rifleForm.name?"not-allowed":"pointer"}}>
                      CREATE RIFLE PROFILE
                    </button>
                  </div>
                </div>
              )}

              {/* ══════════════ RIFLE DETAIL ══════════════ */}
              {view==="rifleDetail"&&selRifle&&(()=>{
                const r=selRifle;
                const dirty=needsClean(r), moaWarn=needsMoaWarn(r);
                const total=totalRounds(r), lMoa=latestRifleMoa(r), bMoa=bestRifleMoa(r);
                const allEntries=allRifleMoaEntries(r);
                const metric=getRifleMetric(r), bg=findBestAmmoGroup(r,metric);
                return (
                  <div>
                    <div style={{padding:"28px 22px 0"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
                        <BackBtn label="← RIFLES" to={goRifles}/>
                        <div style={{display:"flex",gap:8}}>
                          <button onClick={()=>startEditRifle(r)} style={{background:"rgba(201,169,110,0.08)",border:`1px solid ${T.goldDim}`,borderRadius:8,color:T.gold,fontSize:11,fontFamily:T.mono,letterSpacing:"0.1em",padding:"7px 14px",cursor:"pointer"}}>EDIT</button>
                          <button onClick={()=>deleteRifle(r.id)} style={{background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.25)",borderRadius:8,color:"#f87171",fontSize:11,fontFamily:T.mono,letterSpacing:"0.1em",padding:"7px 14px",cursor:"pointer"}}>DELETE</button>
                        </div>
                      </div>

                      {/* Inline edit panel */}
                      {editingRifle&&(
                        <div style={{background:T.surface,border:`1px solid ${T.goldDim}`,borderRadius:14,padding:"16px",marginBottom:20}}>
                          <div style={{fontFamily:T.mono,fontSize:10,color:T.gold,letterSpacing:"0.16em",marginBottom:14}}>EDIT PROFILE</div>
                          <RifleFormFields form={rifleForm} setForm={setRifleForm}/>
                          <div style={{display:"flex",gap:8,marginTop:14}}>
                            <button onClick={saveRifleEdit} style={{flex:1,padding:"13px",background:`linear-gradient(135deg,${T.gold},#9d6f2a)`,border:"none",borderRadius:10,color:"#0c0c0d",fontSize:12,fontWeight:700,fontFamily:T.mono,letterSpacing:"0.12em",cursor:"pointer"}}>SAVE CHANGES</button>
                            <button onClick={()=>setEditingRifle(false)} style={{padding:"13px 16px",background:"transparent",border:`1px solid ${T.border}`,borderRadius:10,color:T.textMid,cursor:"pointer",fontSize:16}}>✕</button>
                          </div>
                        </div>
                      )}

                      <div style={{fontFamily:T.mono,fontSize:10,color:T.goldDim,letterSpacing:"0.2em",marginBottom:6}}>TARGET RIFLE</div>
                      <div style={{fontFamily:T.display,fontSize:38,color:T.text,letterSpacing:"0.05em",lineHeight:1}}>{r.name.toUpperCase()}</div>
                      {r.serial&&<div style={{fontFamily:T.mono,fontSize:11,color:T.goldDim,marginTop:6,letterSpacing:"0.14em"}}>S/N {r.serial}</div>}
                      {r.caliber&&<div style={{fontFamily:T.mono,fontSize:12,color:T.textMid,marginTop:4}}>{r.caliber}</div>}
                      <div style={{fontFamily:T.mono,fontSize:10,color:T.textDim,marginTop:4}}>ADDED {r.created.toUpperCase()}</div>
                    </div>

                    {/* Accuracy alert */}
                    {moaWarn&&!editingRifle&&(
                      <div style={{margin:"18px 22px 0",background:T.redDim,border:"1px solid rgba(239,68,68,0.4)",borderRadius:14,padding:"18px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
                          <span style={{fontSize:26}}>🎯</span>
                          <div>
                            <div style={{fontFamily:T.display,fontSize:20,color:T.red,letterSpacing:"0.06em"}}>ACCURACY DEGRADED</div>
                            <div style={{fontFamily:T.mono,fontSize:10,color:"#993333",marginTop:4}}>LAST GROUP: {lMoa} MOA · THRESHOLD: {r.moaThreshold} MOA</div>
                            <div style={{fontFamily:T.mono,fontSize:10,color:"#993333",marginTop:2}}>BARREL MAY BE SHOT-OUT OR ACCURACY HAS CHANGED</div>
                          </div>
                        </div>
                        <button onClick={()=>setMoaDismissed(prev=>({...prev,[r.id]:true}))} style={{width:"100%",padding:"12px",background:"rgba(239,68,68,0.2)",border:"1px solid rgba(239,68,68,0.4)",borderRadius:10,color:T.red,fontSize:11,fontWeight:700,fontFamily:T.mono,letterSpacing:"0.12em",cursor:"pointer"}}>DISMISS WARNING</button>
                      </div>
                    )}

                    {/* Clean alert */}
                    {dirty&&!editingRifle&&(
                      <div style={{margin:"12px 22px 0",background:T.amberDim,border:"1px solid rgba(245,158,11,0.35)",borderRadius:14,padding:"18px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
                          <span style={{fontSize:24}}>🧹</span>
                          <div>
                            <div style={{fontFamily:T.display,fontSize:20,color:T.amber,letterSpacing:"0.06em"}}>CLEAN YOUR BARREL</div>
                            <div style={{fontFamily:T.mono,fontSize:10,color:"#92681a",marginTop:4}}>{r.roundsSinceClean} RDS SINCE CLEAN · INTERVAL {r.cleanInterval}</div>
                          </div>
                        </div>
                        <button onClick={()=>markCleaned(r.id)} style={{width:"100%",padding:"13px",background:T.amber,border:"none",borderRadius:10,color:"#0c0c0d",fontSize:12,fontWeight:700,fontFamily:T.mono,letterSpacing:"0.14em",cursor:"pointer"}}>✓ MARK AS CLEANED</button>
                      </div>
                    )}

                    {/* Stat cards */}
                    <div style={{display:"flex",gap:8,margin:"18px 22px 0"}}>
                      {[
                        {label:"Total Rds", value:total.toLocaleString(),      color:T.gold,  glow:"rgba(201,169,110,0.08)"},
                        {label:"Sessions",  value:r.sessions.length,            color:T.blue,  glow:"rgba(96,165,250,0.06)"},
                        {label:"Best MOA",  value:bMoa!=null?`${bMoa}`:"—",   color:T.green, glow:"rgba(74,222,128,0.06)"},
                      ].map((c,i)=>(
                        <div key={i} style={{flex:1,background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,padding:"14px 10px",textAlign:"center",position:"relative",overflow:"hidden"}}>
                          <div style={{position:"absolute",inset:0,background:`radial-gradient(circle at 50% 0%,${c.glow},transparent 70%)`}}/>
                          <div style={{fontFamily:T.display,fontSize:26,color:c.color,lineHeight:1,position:"relative"}}>{c.value}</div>
                          <div style={{fontFamily:T.mono,fontSize:9,color:T.textDim,letterSpacing:"0.12em",textTransform:"uppercase",marginTop:4,position:"relative"}}>{c.label}</div>
                        </div>
                      ))}
                    </div>

                    {/* Best load card */}
                    <div style={{margin:"12px 22px 0",background:T.surface,border:`1px solid ${bg?"rgba(74,222,128,0.35)":T.border}`,borderRadius:14,overflow:"hidden"}}>
                      <div style={{padding:"12px 16px",borderBottom:`1px solid ${T.border}`}}>
                        <div style={{fontFamily:T.mono,fontSize:10,color:T.textMid,letterSpacing:"0.14em",marginBottom:10}}>BEST LOAD RANKED BY</div>
                        <div style={{display:"flex",gap:6}}>
                          {BEST_METRICS.map(m=>(
                            <button key={m.key} onClick={()=>setBestMetric(prev=>({...prev,[r.id]:m.key}))}
                              style={{flex:1,padding:"8px 4px",borderRadius:8,cursor:"pointer",fontFamily:T.mono,fontSize:9,fontWeight:600,letterSpacing:"0.04em",border:metric===m.key?`1px solid ${T.green}`:`1px solid ${T.border}`,background:metric===m.key?"rgba(74,222,128,0.1)":"transparent",color:metric===m.key?T.green:T.textMid,transition:"all 0.12s",textAlign:"center"}}>
                              {m.label}
                            </button>
                          ))}
                        </div>
                        <div style={{fontFamily:T.mono,fontSize:9,color:T.textDim,marginTop:6,letterSpacing:"0.04em"}}>{BEST_METRICS.find(m=>m.key===metric)?.desc}</div>
                      </div>
                      {bg?(
                        <div style={{padding:"14px 16px"}}>
                          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                            <span style={{fontSize:18}}>🏆</span>
                            <span style={{fontFamily:T.mono,fontSize:10,color:T.green,letterSpacing:"0.14em",fontWeight:700}}>BEST PERFORMING LOAD</span>
                          </div>
                          <div style={{fontFamily:T.display,fontSize:22,color:T.text,letterSpacing:"0.06em"}}>{entryAmmoName(bg.proto).toUpperCase()}</div>
                          {bg.proto.bulletWeight&&<div style={{fontFamily:T.mono,fontSize:11,color:T.textMid,marginTop:3}}>{bg.proto.bulletWeight}{bg.proto.bulletType?` · ${bg.proto.bulletType}`:""}{bg.proto.bulletMfg?` · ${bg.proto.bulletMfg}`:""}</div>}
                          {bg.proto.powderCharge&&<div style={{fontFamily:T.mono,fontSize:10,color:T.textDim,marginTop:2}}>{bg.proto.powderCharge}{bg.proto.powderMfg?` ${bg.proto.powderMfg}`:""}{bg.proto.primerType?` · ${bg.proto.primerType}`:""}</div>}
                          <div style={{display:"flex",alignItems:"center",gap:8,marginTop:10,flexWrap:"wrap"}}>
                            {metric==="stdDev"?(
                              <div style={{display:"inline-flex",alignItems:"center",gap:4,background:T.purpleDim,border:"1px solid rgba(167,139,250,0.3)",borderRadius:6,padding:"3px 8px"}}>
                                <span style={{fontFamily:T.mono,fontSize:11,fontWeight:700,color:T.purple}}>σ {groupStdDev(bg)} MOA</span>
                              </div>
                            ):(
                              <MoaBadge moa={groupMetricVal(bg,metric)} threshold={r.moaThreshold}/>
                            )}
                            <span style={{fontFamily:T.mono,fontSize:9,color:T.textDim}}>
                              ACROSS {bg.entries.filter(e=>e.moa!=null).length} GROUP{bg.entries.filter(e=>e.moa!=null).length!==1?"S":""}
                            </span>
                          </div>
                        </div>
                      ):(
                        <div style={{padding:"16px",fontFamily:T.mono,fontSize:10,color:T.textDim,textAlign:"center",letterSpacing:"0.08em"}}>LOG GROUP SIZES TO SEE BEST LOAD</div>
                      )}
                    </div>

                    {/* MOA sparkline */}
                    {allEntries.length>=2&&(
                      <div style={{margin:"12px 22px 0",background:T.surface,border:`1px solid ${T.border}`,borderRadius:14,padding:"16px 18px"}}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
                          <span style={{fontFamily:T.mono,fontSize:11,color:T.textMid,letterSpacing:"0.08em"}}>MOA TREND — ALL SESSIONS</span>
                          {r.moaThreshold&&<span style={{fontFamily:T.mono,fontSize:10,color:T.red,opacity:0.7}}>— {r.moaThreshold} THRESHOLD</span>}
                        </div>
                        <MoaSparkline entries={allEntries} threshold={r.moaThreshold} width={296} height={60}/>
                      </div>
                    )}

                    {/* Barrel clean tracker */}
                    {r.cleanInterval&&(
                      <div style={{margin:"12px 22px 0",background:T.surface,border:`1px solid ${dirty?"rgba(245,158,11,0.3)":T.border}`,borderRadius:14,padding:"16px 18px"}}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                          <span style={{fontFamily:T.mono,fontSize:11,fontWeight:700,color:dirty?T.amber:T.textMid}}>🧹 BARREL CLEAN</span>
                          <span style={{fontFamily:T.mono,fontSize:11,color:T.textDim}}>{r.roundsSinceClean} / {r.cleanInterval} RDS</span>
                        </div>
                        <div style={{height:5,background:T.card,borderRadius:3,overflow:"hidden"}}>
                          <div style={{height:"100%",width:`${cleanPct(r)}%`,background:cleanPct(r)>=100?T.amber:cleanPct(r)>75?"#f97316":T.gold,borderRadius:3,transition:"width 0.4s"}}/>
                        </div>
                        <div style={{display:"flex",justifyContent:"space-between",marginTop:8}}>
                          <span style={{fontFamily:T.mono,fontSize:10,color:T.textDim}}>{dirty?"⚠ CLEAN REQUIRED":`${r.cleanInterval-r.roundsSinceClean} RDS UNTIL NEXT CLEAN`}</span>
                          <span style={{fontFamily:T.mono,fontSize:10,color:T.textDim}}>{Math.round(cleanPct(r))}%</span>
                        </div>
                        {!dirty&&<button onClick={()=>markCleaned(r.id)} style={{marginTop:10,width:"100%",padding:"10px",background:"transparent",border:`1px solid ${T.border}`,borderRadius:8,color:T.textMid,fontSize:11,fontFamily:T.mono,letterSpacing:"0.1em",cursor:"pointer"}}>MARK AS CLEANED NOW</button>}
                      </div>
                    )}

                    {/* Sessions list */}
                    <SectionHeader>Sessions</SectionHeader>
                    <div style={{padding:"0 22px",display:"flex",flexDirection:"column",gap:10}}>
                      {r.sessions.length===0&&(
                        <div style={{textAlign:"center",padding:"24px 20px",background:T.surface,border:`1px solid ${T.border}`,borderRadius:14}}>
                          <div style={{fontFamily:T.mono,fontSize:11,color:T.textDim,letterSpacing:"0.08em"}}>NO SESSIONS YET</div>
                        </div>
                      )}
                      {r.sessions.map(s=>{
                        const sTotal=s.rangeEntries.reduce((a,e)=>a+e.count,0);
                        const sAvg=sessionAvgMoa(s), sBest=sessionBestMoa(s);
                        const overMoa=r.moaThreshold&&sBest!=null&&sBest>r.moaThreshold;
                        return (
                          <div key={s.id} onClick={()=>goSessionDetail(s.id)} style={{background:T.surface,border:`1px solid ${overMoa?"rgba(239,68,68,0.35)":T.border}`,borderRadius:14,padding:"15px 18px",cursor:"pointer",position:"relative",overflow:"hidden"}}>
                            <div style={{position:"absolute",top:0,left:0,width:3,height:"100%",background:`linear-gradient(180deg,${overMoa?T.red:T.blue},transparent)`,borderRadius:"14px 0 0 14px"}}/>
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginLeft:8}}>
                              <div style={{flex:1}}>
                                <div style={{fontFamily:T.display,fontSize:18,color:T.text,letterSpacing:"0.06em"}}>{s.name.toUpperCase()}</div>
                                <div style={{fontFamily:T.mono,fontSize:10,color:T.textMid,marginTop:2}}>{s.rangeEntries.length} ENTR{s.rangeEntries.length!==1?"IES":"Y"}</div>
                                {sBest!=null&&<div style={{marginTop:5}}><MoaBadge moa={sBest} threshold={r.moaThreshold}/></div>}
                              </div>
                              <div style={{textAlign:"right",flexShrink:0,marginLeft:8}}>
                                <div style={{fontFamily:T.display,fontSize:28,color:T.blue,lineHeight:1}}>{sTotal.toLocaleString()}</div>
                                <div style={{fontFamily:T.mono,fontSize:9,color:T.textDim,marginTop:2}}>RDS</div>
                              </div>
                            </div>
                            <div style={{display:"flex",justifyContent:"space-between",marginTop:10,marginLeft:8,paddingTop:8,borderTop:`1px solid ${T.border}`}}>
                              <span style={{fontFamily:T.mono,fontSize:9,color:T.textDim}}>{s.created}</span>
                              <span style={{fontFamily:T.mono,fontSize:9,color:T.textDim}}>VIEW ›</span>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                    <div style={{padding:"16px 22px 0"}}>
                      <button onClick={goNewSession} style={{width:"100%",padding:"16px",background:T.goldGlow,border:`1px solid ${T.goldDim}`,borderRadius:12,color:T.gold,fontSize:12,fontWeight:700,fontFamily:T.mono,letterSpacing:"0.14em",cursor:"pointer"}}>+ NEW SESSION</button>
                    </div>

                    {/* Clean history */}
                    {r.cleanHistory.length>0&&(
                      <div style={{margin:"20px 22px 0"}}>
                        <Label>Clean History</Label>
                        <div style={{display:"flex",flexDirection:"column",gap:8}}>
                          {[...r.cleanHistory].reverse().map((c,i)=>(
                            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,padding:"11px 16px"}}>
                              <span style={{fontFamily:T.mono,fontSize:11,color:T.textMid}}>🧹 {c.date.toUpperCase()}</span>
                              <span style={{fontFamily:T.mono,fontSize:11,color:T.amber,fontWeight:700}}>@ {c.atRound.toLocaleString()} RDS</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                );
              })()}

              {/* ══════════════ NEW SESSION ══════════════ */}
              {view==="newSession"&&selRifle&&(
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:14,padding:"28px 22px 22px"}}>
                    <BackBtn label="← RIFLE" to={()=>setView("rifleDetail")}/>
                    <div>
                      <div style={{fontFamily:T.display,fontSize:26,color:T.text,letterSpacing:"0.06em"}}>NEW SESSION</div>
                      <div style={{fontFamily:T.mono,fontSize:10,color:T.goldDim,letterSpacing:"0.12em"}}>{selRifle.name.toUpperCase()}</div>
                    </div>
                  </div>
                  <div style={{padding:"0 22px",display:"flex",flexDirection:"column",gap:14}}>
                    <div style={{fontFamily:T.mono,fontSize:10,color:T.textDim,letterSpacing:"0.06em",lineHeight:1.6}}>
                      The session will be auto-named <span style={{color:T.gold}}>{selRifle.name} · {new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span>. Add optional notes below, then log individual range entries with their ammunition inside the session.
                    </div>
                    <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,overflow:"hidden"}}>
                      <div style={{padding:"10px 14px",borderBottom:`1px solid ${T.border}`}}>
                        <span style={{fontFamily:T.mono,fontSize:10,color:T.textMid,letterSpacing:"0.14em",fontWeight:700}}>RANGE NOTES — OPTIONAL</span>
                      </div>
                      <div style={{padding:"14px",display:"flex",flexDirection:"column",gap:12}}>
                        <div><Label>Conditions</Label><Textarea value={sessionForm.conditions} onChange={e=>setSessionForm({...sessionForm,conditions:e.target.value})} placeholder="Range, target distance, lighting, surface..." rows={2}/></div>
                        <div><Label>Environmentals</Label><Textarea value={sessionForm.environmentals} onChange={e=>setSessionForm({...sessionForm,environmentals:e.target.value})} placeholder="Temperature, wind, humidity, altitude..." rows={2}/></div>
                      </div>
                    </div>
                    <button onClick={createSession}
                      style={{width:"100%",padding:"17px",background:`linear-gradient(135deg,${T.gold},#9d6f2a)`,border:"none",borderRadius:12,color:"#0c0c0d",fontSize:13,fontWeight:700,fontFamily:T.mono,letterSpacing:"0.15em",cursor:"pointer",marginBottom:8}}>
                      CREATE SESSION
                    </button>
                  </div>
                </div>
              )}

              {/* ══════════════ SESSION DETAIL ══════════════ */}
              {view==="sessionDetail"&&selRifle&&selSession&&(()=>{
                const r=selRifle, s=selSession;
                const sTotal=s.rangeEntries.reduce((a,e)=>a+e.count,0);
                const sAvg=sessionAvgMoa(s), sBest=sessionBestMoa(s);
                const allMoa=s.rangeEntries.filter(e=>e.moa!=null);
                return (
                  <div>
                    <div style={{padding:"28px 22px 0"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
                        <BackBtn label="← SESSIONS" to={()=>setView("rifleDetail")}/>
                        <button onClick={()=>deleteSession(s.id)} style={{background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.25)",borderRadius:8,color:"#f87171",fontSize:11,fontFamily:T.mono,letterSpacing:"0.1em",padding:"7px 14px",cursor:"pointer"}}>DELETE</button>
                      </div>
                      <div style={{fontFamily:T.mono,fontSize:10,color:T.goldDim,letterSpacing:"0.2em",marginBottom:6}}>{r.name.toUpperCase()}{r.caliber?` · ${r.caliber}`:""}</div>
                      <div style={{fontFamily:T.display,fontSize:30,color:T.text,letterSpacing:"0.05em",lineHeight:1}}>{s.name.toUpperCase()}</div>
                      <div style={{fontFamily:T.mono,fontSize:10,color:T.textDim,marginTop:4}}>{s.created}</div>
                    </div>

                    {/* Session stat cards */}
                    <div style={{display:"flex",gap:8,margin:"18px 22px 0"}}>
                      {[
                        {label:"Rounds",    value:sTotal.toLocaleString(),      color:T.gold,  glow:"rgba(201,169,110,0.08)"},
                        {label:"Avg Group", value:sAvg!=null?`${sAvg} MOA`:"—", color:T.green, glow:"rgba(74,222,128,0.06)"},
                        {label:"Best Group",value:sBest!=null?`${sBest} MOA`:"—",color:T.blue,  glow:"rgba(96,165,250,0.06)"},
                      ].map((c,i)=>(
                        <div key={i} style={{flex:1,background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,padding:"14px 8px",textAlign:"center",position:"relative",overflow:"hidden"}}>
                          <div style={{position:"absolute",inset:0,background:`radial-gradient(circle at 50% 0%,${c.glow},transparent 70%)`}}/>
                          <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)"}}><Crosshair size={60} opacity={0.04}/></div>
                          <div style={{fontFamily:i>0?T.mono:T.display,fontSize:i>0?12:22,color:c.color,lineHeight:1,position:"relative",fontWeight:i>0?700:400}}>{c.value}</div>
                          <div style={{fontFamily:T.mono,fontSize:9,color:T.textDim,letterSpacing:"0.1em",textTransform:"uppercase",marginTop:4,position:"relative"}}>{c.label}</div>
                        </div>
                      ))}
                    </div>

                    {/* MOA sparkline */}
                    {allMoa.length>=2&&(
                      <div style={{margin:"12px 22px 0",background:T.surface,border:`1px solid ${T.border}`,borderRadius:14,padding:"16px 18px"}}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
                          <span style={{fontFamily:T.mono,fontSize:11,color:T.textMid,letterSpacing:"0.08em"}}>GROUP MOA — THIS SESSION</span>
                          {r.moaThreshold&&<span style={{fontFamily:T.mono,fontSize:10,color:T.red,opacity:0.7}}>— {r.moaThreshold}</span>}
                        </div>
                        <MoaSparkline entries={allMoa} threshold={r.moaThreshold} width={296} height={60}/>
                      </div>
                    )}

                    {/* Session notes */}
                    {s.conditions&&(
                      <div style={{margin:"12px 22px 0",background:T.surface,border:`1px solid ${T.border}`,borderRadius:14,padding:"16px 18px"}}>
                        <Label>Conditions</Label>
                        <div style={{color:T.textMid,fontSize:14,lineHeight:1.6,marginTop:4}}>{s.conditions}</div>
                      </div>
                    )}
                    {s.environmentals&&(
                      <div style={{margin:"12px 22px 0",background:T.surface,border:`1px solid ${T.border}`,borderRadius:14,padding:"16px 18px"}}>
                        <Label>Environmentals</Label>
                        <div style={{color:T.textMid,fontSize:14,lineHeight:1.6,marginTop:4}}>{s.environmentals}</div>
                      </div>
                    )}

                    {/* ── Range entries ── */}
                    <SectionHeader accent={T.blue}>Range Entries</SectionHeader>
                    <div style={{padding:"0 22px",display:"flex",flexDirection:"column",gap:10}}>

                      {/* Add new entry form */}
                      {addingEntry&&!editingEntryId?(
                        <div style={{background:T.surface,border:`1px solid ${T.goldDim}`,borderRadius:14,padding:"14px"}}>
                          <div style={{fontFamily:T.mono,fontSize:10,color:T.gold,letterSpacing:"0.14em",marginBottom:12}}>NEW RANGE ENTRY</div>
                          <EntryForm
                            form={entryForm}
                            setForm={setEntryForm}
                            moaThreshold={r.moaThreshold}
                            onSave={()=>addEntry(r.id,s.id)}
                            onCancel={()=>{setAddingEntry(false);setEntryForm(EMPTY_ENTRY);}}
                            saveLabel="LOG ENTRY"
                          />
                        </div>
                      ):(
                        !editingEntryId&&(
                          <button onClick={()=>{setAddingEntry(true);setEntryForm(EMPTY_ENTRY);}}
                            style={{width:"100%",padding:"15px",background:T.goldGlow,border:`1px solid ${T.goldDim}`,borderRadius:12,color:T.gold,fontSize:12,fontWeight:700,fontFamily:T.mono,letterSpacing:"0.12em",cursor:"pointer"}}>
                            + LOG RANGE ENTRY
                          </button>
                        )
                      )}

                      {/* Existing entries */}
                      {s.rangeEntries.length===0&&!addingEntry&&(
                        <div style={{textAlign:"center",padding:"20px",background:T.surface,border:`1px solid ${T.border}`,borderRadius:14}}>
                          <div style={{fontFamily:T.mono,fontSize:11,color:T.textDim,letterSpacing:"0.08em"}}>NO ENTRIES YET — LOG YOUR FIRST ROUND</div>
                        </div>
                      )}

                      {[...s.rangeEntries].reverse().map(e=>{
                        const isEditingThis = editingEntryId===e.id;
                        const overMoa = r.moaThreshold&&e.moa!=null&&e.moa>r.moaThreshold;
                        return (
                          <div key={e.id}>
                            {isEditingThis?(
                              <div style={{background:T.surface,border:`1px solid ${T.goldDim}`,borderRadius:14,padding:"14px"}}>
                                <div style={{fontFamily:T.mono,fontSize:10,color:T.gold,letterSpacing:"0.14em",marginBottom:12}}>EDIT ENTRY</div>
                                <EntryForm
                                  form={entryForm}
                                  setForm={setEntryForm}
                                  moaThreshold={r.moaThreshold}
                                  onSave={()=>saveEntryEdit(r.id,s.id)}
                                  onCancel={()=>{setEditingEntryId(null);setEntryForm(EMPTY_ENTRY);}}
                                  saveLabel="SAVE CHANGES"
                                />
                              </div>
                            ):(
                              <div style={{background:T.surface,border:`1px solid ${overMoa?"rgba(239,68,68,0.3)":T.border}`,borderRadius:14,padding:"14px 16px"}}>
                                {/* Entry header */}
                                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                                  <span style={{fontFamily:T.mono,fontSize:11,color:T.textMid,letterSpacing:"0.06em"}}>{e.date.toUpperCase()}</span>
                                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                                    {e.moa!=null&&<MoaBadge moa={e.moa} threshold={r.moaThreshold}/>}
                                    <span style={{fontFamily:T.display,fontSize:20,color:T.gold,letterSpacing:"0.06em"}}>+{e.count} RDS</span>
                                  </div>
                                </div>
                                {/* Ammo summary */}
                                <div style={{background:T.card,borderRadius:10,padding:"10px 12px",marginBottom:10}}>
                                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                                    <span style={{fontFamily:T.mono,fontSize:9,color:T.blue,letterSpacing:"0.12em",fontWeight:700}}>🔫 {e.isCustom?"HANDLOAD":"FACTORY"}</span>
                                  </div>
                                  <div style={{fontFamily:T.display,fontSize:16,color:T.text,letterSpacing:"0.05em"}}>{entryAmmoName(e).toUpperCase()}</div>
                                  {e.bulletWeight&&<div style={{fontFamily:T.mono,fontSize:10,color:T.textMid,marginTop:2}}>{e.bulletWeight}{e.bulletType?` · ${e.bulletType}`:""}{e.bulletMfg?` · ${e.bulletMfg}`:""}</div>}
                                  {e.powderCharge&&<div style={{fontFamily:T.mono,fontSize:10,color:T.amber,marginTop:1}}>{e.powderCharge}{e.powderMfg?` ${e.powderMfg}`:""}{e.primerType?` · ${e.primerType}`:""}</div>}
                                </div>
                                {/* Edit / Delete */}
                                <div style={{display:"flex",gap:7}}>
                                  <button onClick={()=>startEditEntry(e)}
                                    style={{flex:1,padding:"9px",background:"rgba(201,169,110,0.08)",border:`1px solid ${T.goldDim}`,borderRadius:8,color:T.gold,fontSize:11,fontFamily:T.mono,letterSpacing:"0.1em",cursor:"pointer"}}>
                                    EDIT
                                  </button>
                                  <button onClick={()=>deleteEntry(r.id,s.id,e.id)}
                                    style={{padding:"9px 13px",background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.25)",borderRadius:8,color:"#f87171",fontSize:11,fontFamily:T.mono,cursor:"pointer"}}>
                                    DELETE
                                  </button>
                                </div>
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })()}

            </div>{/* end scroll */}

            {/* Home bar */}
            <div style={{position:"relative",zIndex:1,height:34,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <div style={{width:100,height:4,background:T.border,borderRadius:2}}/>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>

          .then(r=>console.log('SW:',r.scope))

  </script>
</body>
